<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <radialGradient id="strike" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <circle cx="64" cy="64" r="54" fill="url(#strike)"/>

  <!-- Lightning bolt that branches into 3 legs at the bottom (multi-leg parlay) -->
  <path d="M70 18 L34 70 L56 70 L42 110 L98 50 L72 50 L82 18 Z"
        fill="url(#bolt)"
        stroke="#fbbf24"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Multiplier × overlay top-right -->
  <g transform="translate(98 30)">
    <circle r="13" fill="#0a0c14" stroke="#fbbf24" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="5" x2="5" y2="-5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
