<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="62%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded base -->
  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Golden pyramid (all-seeing finance) -->
  <path d="M64 16 L112 104 L16 104 Z"
        fill="none"
        stroke="url(#gold)"
        stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- Soft glow behind the eye -->
  <ellipse cx="64" cy="74" rx="38" ry="22" fill="url(#glow)"/>

  <!-- Eye almond — light cream -->
  <path d="M30 74 Q64 50 98 74 Q64 98 30 74 Z"
        fill="#f3e8b8"
        stroke="url(#gold)"
        stroke-width="2"/>

  <!-- Iris (purple) -->
  <circle cx="64" cy="74" r="14" fill="url(#iris)"/>

  <!-- Pupil = × multiplier symbol -->
  <g transform="translate(64 74)">
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#0a0c14" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-6" y1="6" x2="6" y2="-6" stroke="#0a0c14" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Tiny light reflection on iris top-right -->
  <circle cx="70" cy="68" r="2.5" fill="#ffffff" opacity="0.85"/>
</svg>
