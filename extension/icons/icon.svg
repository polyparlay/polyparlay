<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="x" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <radialGradient id="profitGlow" cx="80%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#profitGlow)" rx="28" ry="28"/>

  <!-- Big × multiplier as the base symbol -->
  <g transform="translate(64 70)">
    <rect x="-30" y="-9" width="60" height="18" rx="9" fill="url(#x)" transform="rotate(45)"/>
    <rect x="-30" y="-9" width="60" height="18" rx="9" fill="url(#x)" transform="rotate(-45)"/>
  </g>

  <!-- Green profit arrow rising up-right, piercing through the × -->
  <g>
    <!-- Arrow shaft (thick green line going up-right) -->
    <line x1="24" y1="100" x2="108" y2="20"
          stroke="url(#arrow)" stroke-width="11" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <path d="M108 20 L84 24 L104 44 Z" fill="#22c55e" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
    <!-- Highlight stripe along the arrow for sheen -->
    <line x1="28" y1="96" x2="100" y2="28"
          stroke="#bbf7d0" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
