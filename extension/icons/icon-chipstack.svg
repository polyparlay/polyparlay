<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="chip1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="chip2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="chip3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="upArrow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Chip stack: 3 chips climbing higher -->
  <!-- Bottom chip (gold, biggest) -->
  <g transform="translate(38 96)">
    <ellipse cx="0" cy="3" rx="22" ry="6" fill="#000" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="url(#chip1)" stroke="#78350f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="22" ry="7" fill="url(#chip1)" stroke="#78350f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="14" ry="4.5" fill="none" stroke="#fde68a" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Middle chip (purple) -->
  <g transform="translate(60 76)">
    <ellipse cx="0" cy="3" rx="22" ry="6" fill="#000" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="url(#chip2)" stroke="#312e81" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="22" ry="7" fill="url(#chip2)" stroke="#312e81" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="14" ry="4.5" fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Top chip (green - profit) -->
  <g transform="translate(82 56)">
    <ellipse cx="0" cy="3" rx="22" ry="6" fill="#000" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="url(#chip3)" stroke="#14532d" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="22" ry="7" fill="url(#chip3)" stroke="#14532d" stroke-width="1.5"/>
    <!-- × badge on top chip -->
    <line x1="-6" y1="-8" x2="6" y2="4" stroke="#0a0c14" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="4" x2="6" y2="-8" stroke="#0a0c14" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Up-arrow rising from stack -->
  <g>
    <line x1="82" y1="48" x2="108" y2="18" stroke="url(#upArrow)" stroke-width="6" stroke-linecap="round"/>
    <path d="M108 18 L93 19 L107 33 Z" fill="#22c55e"/>
  </g>
</svg>
