<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="outer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Outer flame -->
  <path d="M64 14
           Q40 36 40 64
           Q40 90 64 116
           Q88 90 88 64
           Q88 36 64 14 Z
           M64 26
           Q72 40 72 56
           Q72 70 64 86
           Q56 70 56 56
           Q56 40 64 26 Z"
        fill="url(#outer)"
        fill-rule="evenodd"/>

  <!-- Inner flame (hotter core) -->
  <path d="M64 38
           Q52 56 52 76
           Q52 92 64 108
           Q76 92 76 76
           Q76 56 64 38 Z"
        fill="url(#inner)"
        opacity="0.92"/>

  <!-- × multiplier inside core -->
  <g transform="translate(64 78)">
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#0a0c14" stroke-width="4" stroke-linecap="round"/>
    <line x1="-7" y1="7" x2="7" y2="-7" stroke="#0a0c14" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
