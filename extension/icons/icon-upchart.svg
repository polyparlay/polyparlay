<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Bar chart: three legs of a parlay, each growing taller -->
  <rect x="22" y="78" width="20" height="28" rx="3" fill="url(#bars)" opacity="0.75"/>
  <rect x="54" y="58" width="20" height="48" rx="3" fill="url(#bars)" opacity="0.85"/>
  <rect x="86" y="38" width="20" height="68" rx="3" fill="url(#bars)"/>

  <!-- Green line graph trending up across the bars -->
  <polyline points="22,86 54,64 86,44 112,22"
            fill="none" stroke="url(#line)" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead at the tip -->
  <path d="M112 22 L96 22 L112 38 Z" fill="#22c55e"/>

  <!-- Dots at each bar's top to anchor the line to the legs -->
  <circle cx="22" cy="86" r="4" fill="#bbf7d0"/>
  <circle cx="54" cy="64" r="4" fill="#bbf7d0"/>
  <circle cx="86" cy="44" r="4" fill="#bbf7d0"/>

  <!-- Subtle × badge in corner to mark the brand -->
  <g transform="translate(108 102)" opacity="0.7">
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="5" x2="5" y2="-5" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
