<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#fffbeb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fffbeb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="upArrow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Coin body -->
  <circle cx="56" cy="68" r="38" fill="url(#coin)" stroke="#78350f" stroke-width="2"/>
  <circle cx="56" cy="68" r="38" fill="url(#shine)"/>
  <circle cx="56" cy="68" r="30" fill="none" stroke="#92400e" stroke-width="1.5" opacity="0.45"/>

  <!-- Dollar sign on coin -->
  <g transform="translate(56 68)" fill="#78350f">
    <path d="M-3 -16 L3 -16 L3 -12 L8 -12
             Q14 -12 14 -6 Q14 0 8 0 L-2 0
             Q-8 0 -8 6 Q-8 12 -2 12 L3 12 L3 16 L-3 16 L-3 12 L-8 12 Q-14 12 -14 6 L-8 6
             Q-8 8 -2 8 L4 8 Q8 8 8 4 Q8 0 4 0 L-6 0 Q-12 0 -12 -6 Q-12 -12 -6 -12 L-3 -12 Z"
             opacity="0"/>
    <text x="0" y="9" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
          font-size="38" font-weight="900" fill="#78350f">$</text>
  </g>

  <!-- Up-arrow with × multiplier on the right -->
  <g transform="translate(96 36)">
    <!-- × badge -->
    <circle cx="0" cy="0" r="18" fill="#16a34a" stroke="#0a0c14" stroke-width="2"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-7" y1="7" x2="7" y2="-7" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Small up-arrow above coin showing growth -->
  <g transform="translate(82 102)">
    <line x1="0" y1="6" x2="14" y2="-8" stroke="url(#upArrow)" stroke-width="5" stroke-linecap="round"/>
    <path d="M14 -8 L4 -7 L13 2 Z" fill="#22c55e"/>
  </g>
</svg>
