<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="50%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#161a2e"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="22%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="88%" cy="80%" r="38%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#purpleGlow)"/>
  <rect width="1400" height="560" fill="url(#greenGlow)"/>

  <!-- LEFT: brand lockup -->
  <g transform="translate(80 90)">
    <rect width="92" height="92" rx="22" fill="#0a0c14" stroke="#6366f1" stroke-opacity="0.32" stroke-width="1.5"/>
    <g transform="translate(46 50)">
      <text x="-18" y="10" font-size="50" font-weight="900" fill="#6366f1" letter-spacing="-3">P</text>
      <text x="2" y="10" font-size="50" font-weight="900" fill="#fbbf24" letter-spacing="-3">P</text>
    </g>
  </g>

  <text x="200" y="148" font-size="72" font-weight="900" fill="#f9fafb" letter-spacing="-2">PolyParlay</text>
  <text x="200" y="186" font-size="22" font-weight="700" fill="#a5b4fc" letter-spacing="2">MONTE CARLO · IMPROVE ODDS · SHIP</text>

  <text x="80" y="280" font-size="38" font-weight="800" fill="#f9fafb">Multi-leg parlays for Polymarket.</text>
  <text x="80" y="324" font-size="30" font-weight="600" fill="#cbd5e1">Auto-rebalance weak legs. Simulate 10K runs.</text>

  <!-- Feature pills -->
  <g transform="translate(80 380)">
    <rect width="200" height="44" rx="22" fill="#6366f1" fill-opacity="0.14" stroke="#6366f1" stroke-opacity="0.45"/>
    <text x="100" y="29" text-anchor="middle" font-size="16" font-weight="800" fill="#a5b4fc">CHROME EXTENSION</text>

    <rect x="216" width="200" height="44" rx="22" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.45"/>
    <text x="316" y="29" text-anchor="middle" font-size="16" font-weight="800" fill="#4ade80">FREE + PRO $149/YR</text>

    <rect x="432" width="200" height="44" rx="22" fill="#fbbf24" fill-opacity="0.14" stroke="#fbbf24" stroke-opacity="0.45"/>
    <text x="532" y="29" text-anchor="middle" font-size="16" font-weight="800" fill="#fbbf24">ON-CHAIN VERIFIED</text>
  </g>

  <!-- RIGHT: in-app slip card mockup -->
  <g transform="translate(830 80)">
    <rect width="500" height="400" rx="20" fill="#1a1f3a" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>

    <!-- Header -->
    <text x="32" y="48" font-size="11" font-weight="800" fill="#a5b4fc" letter-spacing="1.5">YOUR PARLAY · 3 LEGS</text>
    <rect x="430" y="28" width="50" height="22" rx="11" fill="#fbbf24"/>
    <text x="455" y="44" text-anchor="middle" font-size="11" font-weight="900" fill="#0a0c14">PRO</text>

    <!-- Leg 1 -->
    <rect x="20" y="68" width="460" height="48" rx="8" fill="#0a0c14"/>
    <rect x="32" y="82" width="42" height="20" rx="4" fill="#22c55e" fill-opacity="0.22"/>
    <text x="53" y="97" text-anchor="middle" font-size="11" font-weight="800" fill="#4ade80">YES</text>
    <text x="86" y="97" font-size="14" font-weight="600" fill="#f9fafb">Fed cuts rates in June 2026</text>
    <text x="468" y="97" text-anchor="end" font-size="16" font-weight="800" fill="#f9fafb">$0.62</text>

    <!-- Leg 2 (flipped) -->
    <rect x="20" y="124" width="460" height="48" rx="8" fill="#0a0c14" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.5"/>
    <rect x="32" y="138" width="40" height="20" rx="4" fill="#ef4444" fill-opacity="0.22"/>
    <text x="52" y="153" text-anchor="middle" font-size="11" font-weight="800" fill="#f87171">NO</text>
    <text x="82" y="153" font-size="14" font-weight="600" fill="#f9fafb">BTC &gt; $100K by May 31</text>
    <text x="360" y="153" font-size="10" font-weight="800" fill="#4ade80" letter-spacing="0.4">↗ FLIPPED</text>
    <text x="468" y="153" text-anchor="end" font-size="16" font-weight="800" fill="#f9fafb">$0.71</text>

    <!-- Leg 3 -->
    <rect x="20" y="180" width="460" height="48" rx="8" fill="#0a0c14"/>
    <rect x="32" y="194" width="42" height="20" rx="4" fill="#22c55e" fill-opacity="0.22"/>
    <text x="53" y="209" text-anchor="middle" font-size="11" font-weight="800" fill="#4ade80">YES</text>
    <text x="86" y="209" font-size="14" font-weight="600" fill="#f9fafb">Trump signs exec order this wk</text>
    <text x="468" y="209" text-anchor="end" font-size="16" font-weight="800" fill="#f9fafb">$0.58</text>

    <!-- Rebalance banner -->
    <rect x="20" y="240" width="460" height="44" rx="8" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.5"/>
    <text x="36" y="258" font-size="11" font-weight="900" fill="#4ade80" letter-spacing="0.8">↗ ODDS REBALANCED</text>
    <text x="36" y="274" font-size="13" font-weight="700" fill="#f9fafb">Win rate 4.3% → 25.5% · multiplier 23.1× → 3.9×</text>

    <!-- Summary metrics -->
    <g transform="translate(20 296)">
      <rect width="146" height="48" rx="8" fill="#0a0c14"/>
      <text x="14" y="18" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.8">SIM WIN RATE</text>
      <text x="14" y="40" font-size="20" font-weight="900" fill="#4ade80">25.5%</text>

      <rect x="158" width="146" height="48" rx="8" fill="#0a0c14"/>
      <text x="172" y="18" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.8">MULTIPLIER</text>
      <text x="172" y="40" font-size="20" font-weight="900" fill="#f9fafb">3.9×</text>

      <rect x="316" width="144" height="48" rx="8" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.45"/>
      <text x="330" y="18" font-size="10" font-weight="800" fill="#4ade80" letter-spacing="0.8">MAX PAYOUT</text>
      <text x="330" y="40" font-size="20" font-weight="900" fill="#4ade80">$39.00</text>
    </g>
  </g>

  <text x="1320" y="528" text-anchor="end" font-size="14" font-weight="700" fill="#6b7280" letter-spacing="2">POLYPARLAY.IO</text>
</svg>
