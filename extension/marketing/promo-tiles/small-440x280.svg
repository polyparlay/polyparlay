<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="80%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="440" height="280" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#purpleGlow)"/>

  <!-- Icon (PP wordmark) -->
  <g transform="translate(40 60)">
    <rect width="60" height="60" fill="#0a0c14" rx="13" stroke="#6366f1" stroke-opacity="0.3"/>
    <g transform="translate(30 30)">
      <text x="-12" y="6" font-size="32" font-weight="900" fill="#6366f1" letter-spacing="-2">P</text>
      <text x="2" y="6" font-size="32" font-weight="900" fill="#fbbf24" letter-spacing="-2">P</text>
    </g>
  </g>

  <!-- Brand name + tagline -->
  <text x="116" y="80" font-size="32" font-weight="900" fill="#f9fafb" letter-spacing="-0.5">PolyParlay</text>
  <text x="116" y="105" font-size="11" font-weight="700" fill="#a5b4fc" letter-spacing="1.5">PARLAY BUILDER FOR POLYMARKET</text>

  <!-- Mini slip card mockup -->
  <g transform="translate(40 150)">
    <rect width="360" height="100" rx="10" fill="#1a1f3a" stroke="#6366f1" stroke-opacity="0.32"/>

    <!-- Leg 1 -->
    <rect x="14" y="14" width="30" height="20" rx="4" fill="#22c55e" fill-opacity="0.22"/>
    <text x="29" y="29" text-anchor="middle" font-size="11" font-weight="800" fill="#4ade80">YES</text>
    <text x="50" y="29" font-size="13" font-weight="600" fill="#f9fafb">Fed cuts rates in June</text>
    <text x="346" y="29" text-anchor="end" font-size="14" font-weight="800" fill="#f9fafb">$0.62</text>

    <!-- Leg 2 (flipped highlight) -->
    <rect x="14" y="40" width="30" height="20" rx="4" fill="#ef4444" fill-opacity="0.22"/>
    <text x="29" y="55" text-anchor="middle" font-size="11" font-weight="800" fill="#f87171">NO</text>
    <text x="50" y="55" font-size="13" font-weight="600" fill="#f9fafb">BTC &gt; $100K by May 31</text>
    <text x="270" y="55" font-size="10" font-weight="800" fill="#4ade80" letter-spacing="0.5">↗ FLIPPED</text>
    <text x="346" y="55" text-anchor="end" font-size="14" font-weight="800" fill="#f9fafb">$0.71</text>

    <!-- Rebalance banner -->
    <rect x="14" y="68" width="332" height="22" rx="6" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.45"/>
    <text x="22" y="83" font-size="11" font-weight="800" fill="#4ade80" letter-spacing="0.4">↗ WIN RATE 4.3% → 25.5% · MULTIPLIER 3.9×</text>
  </g>
</svg>
