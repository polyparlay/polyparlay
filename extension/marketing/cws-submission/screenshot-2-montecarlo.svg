<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="55%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#161a2e"/>
    </linearGradient>
    <radialGradient id="glow2" cx="25%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg2)"/>
  <rect width="1280" height="800" fill="url(#glow2)"/>

  <!-- RIGHT: headline -->
  <text x="690" y="250" font-size="56" font-weight="900" fill="#f9fafb">10,000-outcome</text>
  <text x="690" y="314" font-size="56" font-weight="900" fill="#f9fafb">Monte Carlo sim</text>
  <text x="690" y="378" font-size="26" font-weight="500" fill="#9ca3af">Run the slip 10K times. See the real win-rate</text>
  <text x="690" y="412" font-size="26" font-weight="500" fill="#9ca3af">distribution — then let Improve Odds rebalance</text>
  <text x="690" y="446" font-size="26" font-weight="500" fill="#9ca3af">your weakest leg automatically.</text>

  <g transform="translate(690 500)">
    <rect width="320" height="44" rx="22" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.45"/>
    <text x="160" y="29" text-anchor="middle" font-size="15" font-weight="800" fill="#4ade80">↗ WIN RATE 4.3% → 25.5% AFTER REBALANCE</text>
  </g>

  <!-- LEFT: sim results card -->
  <g transform="translate(110 110)">
    <rect width="470" height="580" rx="16" fill="url(#card2)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>

    <!-- header -->
    <text x="24" y="44" font-size="15" font-weight="800" fill="#f9fafb">Monte Carlo · 10,000 sims</text>
    <text x="446" y="44" text-anchor="end" font-size="20" font-weight="400" fill="#6b7280">×</text>

    <!-- metric grid -->
    <g transform="translate(24 64)">
      <rect width="200" height="76" rx="10" fill="#11141a" stroke="#1f2542"/>
      <text x="16" y="26" font-size="11" font-weight="800" fill="#6b7280" letter-spacing="0.8">WIN RATE</text>
      <text x="16" y="58" font-size="30" font-weight="900" fill="#4ade80">25.5%</text>

      <rect x="218" width="200" height="76" rx="10" fill="#11141a" stroke="#1f2542"/>
      <text x="234" y="26" font-size="11" font-weight="800" fill="#6b7280" letter-spacing="0.8">MEDIAN PAYOUT</text>
      <text x="234" y="58" font-size="30" font-weight="900" fill="#f9fafb">$0.00</text>

      <rect y="92" width="200" height="76" rx="10" fill="#11141a" stroke="#1f2542"/>
      <text x="16" y="118" font-size="11" font-weight="800" fill="#6b7280" letter-spacing="0.8">BEST CASE</text>
      <text x="16" y="150" font-size="30" font-weight="900" fill="#f9fafb">$41.06</text>

      <rect x="218" y="92" width="200" height="76" rx="10" fill="#11141a" stroke="#1f2542"/>
      <text x="234" y="118" font-size="11" font-weight="800" fill="#6b7280" letter-spacing="0.8">EXPECTED ROI</text>
      <text x="234" y="150" font-size="30" font-weight="900" fill="#4ade80">+12.4%</text>
    </g>

    <!-- histogram -->
    <text x="24" y="270" font-size="11" font-weight="800" fill="#6b7280" letter-spacing="0.8">PAYOUT DISTRIBUTION</text>
    <g transform="translate(24 280)">
      <rect x="0"   y="90" width="38" height="30"  fill="#ef4444" fill-opacity="0.65"/>
      <rect x="44"  y="40" width="38" height="80"  fill="#6366f1" fill-opacity="0.65"/>
      <rect x="88"  y="14" width="38" height="106" fill="#6366f1" fill-opacity="0.85"/>
      <rect x="132" y="48" width="38" height="72"  fill="#6366f1" fill-opacity="0.65"/>
      <rect x="176" y="72" width="38" height="48"  fill="#6366f1" fill-opacity="0.5"/>
      <rect x="220" y="86" width="38" height="34"  fill="#22c55e" fill-opacity="0.5"/>
      <rect x="264" y="100" width="38" height="20" fill="#22c55e" fill-opacity="0.6"/>
      <rect x="308" y="106" width="38" height="14" fill="#22c55e" fill-opacity="0.75"/>
      <rect x="352" y="110" width="38" height="10" fill="#22c55e" fill-opacity="0.9"/>
      <line x1="0" y1="120" x2="390" y2="120" stroke="#2c3142" stroke-width="1"/>
    </g>

    <!-- improve odds banner -->
    <g transform="translate(24 430)">
      <rect width="422" height="90" rx="10" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.5"/>
      <text x="16" y="28" font-size="12" font-weight="900" fill="#4ade80" letter-spacing="0.6">↗ IMPROVE ODDS</text>
      <text x="16" y="52" font-size="14" font-weight="700" fill="#f9fafb">Flip leg 2 (BTC) from NO → YES</text>
      <text x="16" y="72" font-size="12" fill="#9ca3af">Win rate 4.3% → 25.5% · weakest leg rebalanced</text>
      <rect x="330" y="26" width="78" height="38" rx="8" fill="#22c55e"/>
      <text x="369" y="50" text-anchor="middle" font-size="14" font-weight="800" fill="#06140e">Apply</text>
    </g>

    <text x="24" y="552" font-size="10.5" fill="#6b7280">Each iteration: independent bernoulli per leg using</text>
    <text x="24" y="567" font-size="10.5" fill="#6b7280">market-implied probabilities.</text>
  </g>
</svg>
