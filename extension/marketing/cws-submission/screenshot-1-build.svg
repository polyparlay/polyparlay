<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="55%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#161a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ticket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>

  <!-- LEFT: headline -->
  <text x="90" y="240" font-size="58" font-weight="900" fill="#f9fafb">Build a parlay from</text>
  <text x="90" y="306" font-size="58" font-weight="900" fill="#f9fafb">any Polymarket market</text>
  <text x="90" y="370" font-size="26" font-weight="500" fill="#9ca3af">Stack binary markets into one slip. See the combined</text>
  <text x="90" y="404" font-size="26" font-weight="500" fill="#9ca3af">multiplier and the payout you'll actually get.</text>

  <!-- brand chip -->
  <g transform="translate(90 460)">
    <rect width="56" height="56" rx="13" fill="#0a0c14" stroke="#6366f1" stroke-opacity="0.35"/>
    <text x="14" y="38" font-size="30" font-weight="900" fill="#6366f1">P</text>
    <text x="29" y="38" font-size="30" font-weight="900" fill="#fbbf24">P</text>
    <text x="74" y="26" font-size="20" font-weight="800" fill="#f9fafb">PolyParlay</text>
    <text x="74" y="46" font-size="12" font-weight="700" fill="#a5b4fc" letter-spacing="1">CHROME EXTENSION · FREE + PRO</text>
  </g>

  <!-- RIGHT: the parlay-ticket card mockup -->
  <g transform="translate(760 120)">
    <rect width="430" height="560" rx="16" fill="url(#ticket)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>

    <!-- popup header -->
    <circle cx="30" cy="34" r="7" fill="#6366f1"/>
    <circle cx="30" cy="34" r="13" fill="#6366f1" fill-opacity="0.3"/>
    <text x="48" y="40" font-size="17" font-weight="800" fill="#f9fafb">PolyParlay</text>

    <!-- ticket header strip -->
    <text x="22" y="78" font-size="11" font-weight="800" fill="#a5b4fc" letter-spacing="1.2">YOUR PARLAY</text>
    <text x="408" y="78" text-anchor="end" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.6">3 LEGS</text>

    <!-- leg 1 -->
    <rect x="20" y="92" width="390" height="56" rx="8" fill="#11141a" stroke="#1f2542"/>
    <rect x="32" y="106" width="38" height="20" rx="4" fill="#22c55e" fill-opacity="0.22"/>
    <text x="51" y="120" text-anchor="middle" font-size="11" font-weight="800" fill="#4ade80">YES</text>
    <text x="80" y="116" font-size="14" font-weight="600" fill="#f9fafb">Fed cuts rates in June 2026</text>
    <text x="80" y="136" font-size="11" fill="#6b7280">resolves 18/06/2026</text>
    <text x="396" y="124" text-anchor="end" font-size="16" font-weight="800" fill="#f9fafb">$0.62</text>

    <!-- leg 2 -->
    <rect x="20" y="156" width="390" height="56" rx="8" fill="#11141a" stroke="#1f2542"/>
    <rect x="32" y="170" width="34" height="20" rx="4" fill="#ef4444" fill-opacity="0.22"/>
    <text x="49" y="184" text-anchor="middle" font-size="11" font-weight="800" fill="#f87171">NO</text>
    <text x="76" y="180" font-size="14" font-weight="600" fill="#f9fafb">BTC above $100K by May 31</text>
    <text x="76" y="200" font-size="11" fill="#6b7280">resolves 31/05/2026</text>
    <text x="396" y="188" text-anchor="end" font-size="16" font-weight="800" fill="#f9fafb">$0.71</text>

    <!-- leg 3 -->
    <rect x="20" y="220" width="390" height="56" rx="8" fill="#11141a" stroke="#1f2542"/>
    <rect x="32" y="234" width="38" height="20" rx="4" fill="#22c55e" fill-opacity="0.22"/>
    <text x="51" y="248" text-anchor="middle" font-size="11" font-weight="800" fill="#4ade80">YES</text>
    <text x="80" y="244" font-size="14" font-weight="600" fill="#f9fafb">Trump signs order this week</text>
    <text x="80" y="264" font-size="11" fill="#6b7280">resolves 16/05/2026</text>
    <text x="396" y="252" text-anchor="end" font-size="16" font-weight="800" fill="#f9fafb">$0.58</text>

    <!-- add another leg -->
    <rect x="20" y="286" width="390" height="38" rx="8" fill="none" stroke="#2c3142" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="215" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">+ Add another leg</text>

    <!-- perforation -->
    <line x1="20" y1="342" x2="410" y2="342" stroke="#2c3142" stroke-width="1.5" stroke-dasharray="3 3"/>

    <!-- math stub -->
    <text x="22" y="372" font-size="13" fill="#9ca3af">Stake</text>
    <rect x="330" y="358" width="80" height="22" rx="5" fill="#11141a" stroke="#1f2542"/>
    <text x="396" y="373" text-anchor="end" font-size="13" font-weight="700" fill="#f9fafb">$10</text>

    <text x="22" y="402" font-size="13" fill="#9ca3af">You'll actually get</text>
    <text x="396" y="402" text-anchor="end" font-size="13" font-weight="800" fill="#22c55e">$16.72 max</text>

    <text x="22" y="428" font-size="13" fill="#9ca3af">Combined multiplier</text>
    <text x="396" y="428" text-anchor="end" font-size="13" font-weight="700" fill="#a5b4fc">4.11×</text>

    <text x="22" y="454" font-size="13" fill="#9ca3af">Hypothetical parlay</text>
    <text x="396" y="454" text-anchor="end" font-size="13" font-weight="600" fill="#9ca3af">$41.06</text>

    <line x1="22" y1="470" x2="408" y2="470" stroke="#2c3142" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="22" y="490" font-size="10.5" fill="#6b7280">PM pays each leg independently — PolyParlay analyses,</text>
    <text x="22" y="505" font-size="10.5" fill="#6b7280">doesn't execute.</text>

    <!-- run sim button -->
    <rect x="20" y="518" width="390" height="28" rx="6" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="215" y="536" text-anchor="middle" font-size="12" font-weight="800" fill="#fbbf24">🎲 Run Monte Carlo + Improve Odds</text>
  </g>
</svg>
