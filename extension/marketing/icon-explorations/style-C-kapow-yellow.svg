<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="Impact, 'Arial Black', sans-serif">
  <!-- STYLE C: Reference #3 (KAPOW!) — single dominant YELLOW jagged
       burst, no blue layer. Red 3D italic text overflows. Orange star
       accents around it. -->

  <!-- Off-white paper -->
  <rect width="128" height="128" fill="#f5f1e8" rx="22"/>

  <!-- Big yellow jagged burst — fewer + longer spikes than Style A/B -->
  <g transform="rotate(-8 64 64)">
    <!-- Drop shadow -->
    <path d="M 64 2
             L 82 30 L 116 14 L 100 42 L 126 60
             L 102 74 L 122 108 L 92 92 L 84 124
             L 64 96 L 44 124 L 36 92 L 6 108 L 26 74
             L 2 60 L 28 42 L 12 14 L 46 30 Z"
          fill="#0a0c14" opacity="0.5" transform="translate(3 4)"/>
    <!-- Yellow burst -->
    <path d="M 64 2
             L 82 30 L 116 14 L 100 42 L 126 60
             L 102 74 L 122 108 L 92 92 L 84 124
             L 64 96 L 44 124 L 36 92 L 6 108 L 26 74
             L 2 60 L 28 42 L 12 14 L 46 30 Z"
          fill="#fcd34d" stroke="#0a0c14" stroke-width="5"
          stroke-linejoin="miter" stroke-miterlimit="3"/>
  </g>

  <!-- Orange star sparks around the burst -->
  <g fill="#f97316" stroke="#0a0c14" stroke-width="1.6" stroke-linejoin="miter">
    <path d="M 110 14 L 113 22 L 121 24 L 113 26 L 110 34 L 107 26 L 99 24 L 107 22 Z"/>
    <path d="M 12 102 L 15 110 L 23 112 L 15 114 L 12 122 L 9 114 L 1 112 L 9 110 Z"/>
    <path d="M 116 96 L 118 102 L 124 103 L 118 104 L 116 110 L 114 104 L 108 103 L 114 102 Z"/>
  </g>

  <!-- HERO TEXT: "POLY PARLAY" arched stacked, 3D extruded italic red -->
  <g transform="skewX(-16)" font-weight="900" text-anchor="middle">
    <!-- POLY (top, smaller) — 3D extrude via offset shadow -->
    <text x="74" y="60" font-size="22" fill="#0a0c14"
          letter-spacing="-1" dx="3" dy="3">POLY</text>
    <text x="74" y="60" font-size="22" stroke="#0a0c14" stroke-width="6"
          stroke-linejoin="round" fill="#0a0c14" letter-spacing="-1">POLY</text>
    <text x="74" y="60" font-size="22" fill="#dc2626" letter-spacing="-1">POLY</text>

    <!-- PARLAY (bottom, hero) — 3D extrude + bigger -->
    <text x="74" y="92" font-size="30" fill="#0a0c14"
          letter-spacing="-2" dx="4" dy="4">PARLAY</text>
    <text x="74" y="92" font-size="30" stroke="#0a0c14" stroke-width="7"
          stroke-linejoin="round" fill="#0a0c14" letter-spacing="-2">PARLAY</text>
    <text x="74" y="92" font-size="30" fill="#dc2626" letter-spacing="-2">PARLAY</text>
  </g>
</svg>
