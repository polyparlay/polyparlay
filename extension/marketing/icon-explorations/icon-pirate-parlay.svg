<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
    <linearGradient id="slipTicket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#aura)" rx="28" ry="28"/>

  <!-- Crossed parlay slips (the "crossbones") -->
  <!-- Slip A: leans left (\) -->
  <g transform="translate(64 82) rotate(-32)">
    <path d="M-9 -34 L9 -34 L9 28
             L6 32 L3 28 L0 32 L-3 28 L-6 32 L-9 28 Z"
          fill="url(#slipTicket)" stroke="#7c2d12" stroke-width="1.2"/>
    <rect x="-7" y="-30" width="14" height="3" rx="1" fill="#7c2d12"/>
    <rect x="-7" y="-22" width="14" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
    <rect x="-7" y="-17" width="10" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
    <rect x="-7" y="-12" width="14" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
    <rect x="-7" y="-7" width="11" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
  </g>
  <!-- Slip B: leans right (/) -->
  <g transform="translate(64 82) rotate(32)">
    <path d="M-9 -34 L9 -34 L9 28
             L6 32 L3 28 L0 32 L-3 28 L-6 32 L-9 28 Z"
          fill="url(#slipTicket)" stroke="#7c2d12" stroke-width="1.2"/>
    <rect x="-7" y="-30" width="14" height="3" rx="1" fill="#7c2d12"/>
    <rect x="-7" y="-22" width="14" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
    <rect x="-7" y="-17" width="9" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
    <rect x="-7" y="-12" width="14" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
    <rect x="-7" y="-7" width="12" height="1.6" rx="0.8" fill="#1a1f3a" opacity="0.7"/>
  </g>

  <!-- Pirate skull (centered, sits on top of crossed slips) -->
  <g transform="translate(64 48)">
    <!-- Cranium dome -->
    <path d="M-22 -10
             Q-22 -26 0 -28
             Q22 -26 22 -10
             Q22 4 16 10
             L16 18
             L10 18 L8 22 L4 18
             L-4 18 L-8 22 L-10 18
             L-16 18 L-16 10
             Q-22 4 -22 -10 Z"
          fill="url(#bone)" stroke="#525252" stroke-width="1.2"/>

    <!-- Eye sockets = × multipliers (the parlay math, not empty skull eyes) -->
    <g transform="translate(-10 -6)">
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#1a1f3a" stroke-width="3.2" stroke-linecap="round"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#1a1f3a" stroke-width="3.2" stroke-linecap="round"/>
    </g>
    <g transform="translate(10 -6)">
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#1a1f3a" stroke-width="3.2" stroke-linecap="round"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#1a1f3a" stroke-width="3.2" stroke-linecap="round"/>
    </g>

    <!-- Triangular nose -->
    <path d="M0 4 L-3 10 L3 10 Z" fill="#1a1f3a"/>

    <!-- Teeth (just hint of jaw) -->
    <g fill="#525252">
      <rect x="-8" y="14" width="2" height="4" rx="0.5"/>
      <rect x="-4" y="14" width="2" height="4" rx="0.5"/>
      <rect x="0" y="14" width="2" height="4" rx="0.5"/>
      <rect x="4" y="14" width="2" height="4" rx="0.5"/>
    </g>

    <!-- 🔥 mark on forehead (the emotional tell) -->
    <g transform="translate(0 -20)">
      <path d="M0 -7
               C 4 -3, 5 1, 4 5
               C 6 5, 5 9, 1 10
               C -3 9, -6 6, -5 2
               C -7 0, -5 -4, -2 -5
               C -1 -6, -0.5 -6.5, 0 -7 Z"
            fill="url(#flame)"/>
    </g>
  </g>
</svg>
