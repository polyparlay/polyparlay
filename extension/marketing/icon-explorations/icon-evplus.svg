<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#aura)" rx="28" ry="28"/>

  <!-- + sign (left, smaller, anchor) -->
  <g transform="translate(28 64)">
    <rect x="-13" y="-3.5" width="26" height="7" rx="3" fill="url(#green)"/>
    <rect x="-3.5" y="-13" width="7" height="26" rx="3" fill="url(#green)"/>
  </g>

  <!-- EV (right, big bold) -->
  <text x="84" y="80" text-anchor="middle"
        font-size="58" font-weight="900" fill="url(#green)" letter-spacing="-3">EV</text>

  <!-- Up tick under EV for emphasis -->
  <line x1="48" y1="100" x2="108" y2="100" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
</svg>
