<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="Impact, 'Arial Black', sans-serif">
  <defs>
    <pattern id="halftone" x="0" y="0" width="6" height="6"
             patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#0a0c14" opacity="0.55"/>
    </pattern>
    <radialGradient id="halftoneFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <mask id="halftoneMask">
      <rect width="128" height="128" fill="url(#halftoneFade)"/>
    </mask>
  </defs>

  <!-- Off-white comic-page paper background -->
  <rect width="128" height="128" fill="#f5f1e8" rx="22" ry="22"/>

  <!-- Halftone dot stipple in corners only -->
  <rect width="128" height="128" fill="url(#halftone)" mask="url(#halftoneMask)"/>

  <!-- ==========================================================
       SMALLER blue burst — backdrop only. Inset from edges so the
       text can overflow it on the left/right like reference KAPOW.
       ========================================================== -->
  <g transform="rotate(-6 64 64)">
    <!-- Drop shadow -->
    <path d="M 64 14
             L 72 32 L 92 18 L 88 38 L 110 30
             L 96 50 L 116 64 L 96 78 L 110 98
             L 88 90 L 92 110 L 72 96 L 64 114
             L 56 96 L 36 110 L 40 90 L 18 98
             L 32 78 L 12 64 L 32 50 L 18 30
             L 40 38 L 36 18 L 56 32 Z"
          fill="#000" opacity="0.3" transform="translate(2 3)"/>

    <!-- Blue starburst -->
    <path d="M 64 14
             L 72 32 L 92 18 L 88 38 L 110 30
             L 96 50 L 116 64 L 96 78 L 110 98
             L 88 90 L 92 110 L 72 96 L 64 114
             L 56 96 L 36 110 L 40 90 L 18 98
             L 32 78 L 12 64 L 32 50 L 18 30
             L 40 38 L 36 18 L 56 32 Z"
          fill="#2563eb"
          stroke="#0a0c14" stroke-width="4" stroke-linejoin="miter" stroke-miterlimit="3"/>

    <!-- Inner yellow cloud — small, sits inside burst as fill -->
    <ellipse cx="64" cy="64" rx="40" ry="32" fill="#fde047"
             stroke="#0a0c14" stroke-width="3"/>
  </g>

  <!-- ==========================================================
       GIANT TEXT — the hero. Stacked POLY / PARLAY!, BIG enough
       to overflow the burst on left/right. Italic skewed, 3-layer
       comic lettering (black outer / white mid / red fill).
       ========================================================== -->
  <g transform="skewX(-14)" font-weight="900" text-anchor="middle">

    <!-- POLY (top line) — 30px -->
    <text x="72" y="62" font-size="30"
          stroke="#0a0c14" stroke-width="8" stroke-linejoin="round" fill="#0a0c14"
          letter-spacing="-1">POLY</text>
    <text x="72" y="62" font-size="30"
          stroke="#ffffff" stroke-width="4" stroke-linejoin="round" fill="#ffffff"
          letter-spacing="-1">POLY</text>
    <text x="72" y="62" font-size="30" fill="#dc2626" letter-spacing="-1">POLY</text>

    <!-- PARLAY! (bottom line) — 26px (longer string) -->
    <text x="72" y="94" font-size="26"
          stroke="#0a0c14" stroke-width="8" stroke-linejoin="round" fill="#0a0c14"
          letter-spacing="-1.5">PARLAY!</text>
    <text x="72" y="94" font-size="26"
          stroke="#ffffff" stroke-width="4" stroke-linejoin="round" fill="#ffffff"
          letter-spacing="-1.5">PARLAY!</text>
    <text x="72" y="94" font-size="26" fill="#dc2626" letter-spacing="-1.5">PARLAY!</text>
  </g>

  <!-- Small yellow star sparks around the burst -->
  <g fill="#fde047" stroke="#0a0c14" stroke-width="1.5" stroke-linejoin="miter">
    <path d="M 14 18 L 17 24 L 23 25 L 17 26 L 14 32 L 11 26 L 5 25 L 11 24 Z"/>
    <path d="M 114 20 L 117 26 L 123 27 L 117 28 L 114 34 L 111 28 L 105 27 L 111 26 Z"/>
    <path d="M 18 106 L 20 110 L 24 111 L 20 112 L 18 116 L 16 112 L 12 111 L 16 110 Z"/>
    <path d="M 110 108 L 112 112 L 116 113 L 112 114 L 110 118 L 108 114 L 104 113 L 108 112 Z"/>
  </g>
</svg>
