<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="stubGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="flameRed" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="55%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="flameOrange" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="flameYellow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="hot" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#hot)" rx="28" ry="28"/>

  <!-- ============================================================
       BIG 🔥 FLAME behind the ticket — 3 sharp tongues, asymmetric
       S-flick on the left, fills the upper portion of the icon.
       ============================================================ -->
  <g transform="translate(64 56)">
    <path d="M -18 36
             C -34 24 -38 6 -28 -10
             C -22 -20 -26 -34 -16 -44
             C -10 -38 -4 -36 -2 -42
             C  2 -52  10 -56 14 -50
             C 18 -42 16 -30 10 -22
             C 16 -28 26 -28 24 -16
             C 22  -8 18  4 24  10
             C 32 18 30 32 18 36
             C 8 40 -4 40 -18 36 Z"
          fill="url(#flameRed)"/>
    <path d="M -10 28
             C -22 18 -24 4 -16 -8
             C -12 -16 -14 -24  -8 -32
             C -4 -26  -2 -24  0 -28
             C  4 -36 10 -38 12 -32
             C 14 -26 12 -18  8 -12
             C 14 -16 20 -16 18 -8
             C 16  0 12  4 16  10
             C 22 16 22 26 14 30
             C  6 32 -2 32 -10 28 Z"
          fill="url(#flameOrange)"/>
    <path d="M -2 18
             C -10 10 -10  -2 -4 -8
             C -2 -12 -2 -18  2 -22
             C  4 -18  6 -16  6 -18
             C  8 -22 10 -22 10 -16
             C 10 -10  8  -4 10  0
             C 14  4 12 12  6 16
             C  2 18 -2 18 -2 18 Z"
          fill="url(#flameYellow)" opacity="0.96"/>
    <ellipse cx="3" cy="4" rx="3" ry="6" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- ============================================================
       PARLAY TICKET with perforated stub, sitting under the flame
       ============================================================ -->
  <g transform="translate(50 76)">
    <!-- Drop shadow -->
    <rect x="-23" y="-26" width="46" height="60" rx="3" fill="#000" opacity="0.5" transform="translate(3 3)"/>

    <!-- BODY (top) -->
    <rect x="-23" y="-26" width="46" height="30" rx="3 3 0 0" fill="url(#paper)" stroke="#92400e" stroke-width="1.5"/>
    <rect x="-21" y="-24" width="42" height="5" rx="1.5" fill="#22c55e"/>
    <text x="0" y="-20" text-anchor="middle" font-size="4.5" font-weight="900"
          fill="#0a0c14" letter-spacing="1.2">WINNING SLIP</text>
    <!-- Leg rows -->
    <rect x="-19" y="-14" width="30" height="2" rx="1" fill="#1a1f3a"/>
    <rect x="-19" y="-10.5" width="22" height="1.6" rx="0.8" fill="#6366f1" opacity="0.75"/>
    <rect x="-19" y="-7" width="30" height="2" rx="1" fill="#1a1f3a"/>
    <rect x="-19" y="-3.5" width="20" height="1.6" rx="0.8" fill="#6366f1" opacity="0.75"/>
    <circle cx="16" cy="-13" r="2.2" fill="#22c55e" opacity="0.9"/>
    <circle cx="16" cy="-6" r="2.2" fill="#22c55e" opacity="0.9"/>

    <!-- Perforated tear-line + notches -->
    <line x1="-23" y1="4" x2="23" y2="4" stroke="#92400e" stroke-width="1" stroke-dasharray="2 2" opacity="0.85"/>
    <circle cx="-23" cy="4" r="2.5" fill="url(#bg)"/>
    <circle cx="23" cy="4" r="2.5" fill="url(#bg)"/>

    <!-- STUB (bottom) with big ×3.2 -->
    <rect x="-23" y="6" width="46" height="28" rx="0 0 3 3" fill="url(#stubGold)" stroke="#92400e" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-size="18" font-weight="900"
          fill="#7c2d12" letter-spacing="-0.8">×3.2</text>
    <text x="0" y="30" text-anchor="middle" font-size="4.5" font-weight="800"
          fill="#92400e" letter-spacing="1.4">$320 PAYOUT</text>
  </g>

  <!-- ============================================================
       CASH BILLS bursting from BEHIND the ticket — cascade right side
       ============================================================ -->
  <g>
    <!-- Bill 1 (back, tilted) -->
    <g transform="translate(86 50) rotate(20)">
      <rect x="-12" y="-7" width="24" height="14" rx="2" fill="url(#cash)" stroke="#14532d" stroke-width="1" opacity="0.9"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#14532d" stroke-width="0.7" opacity="0.55"/>
      <text x="0" y="3" text-anchor="middle" font-size="8" font-weight="900" fill="#14532d">$</text>
    </g>
    <!-- Bill 2 (foreground) -->
    <g transform="translate(96 78) rotate(-12)">
      <rect x="-12" y="-7" width="24" height="14" rx="2" fill="url(#cash)" stroke="#14532d" stroke-width="1"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#14532d" stroke-width="0.7" opacity="0.55"/>
      <text x="0" y="3" text-anchor="middle" font-size="8" font-weight="900" fill="#14532d">$</text>
    </g>
    <!-- Bill 3 (bottom edge) -->
    <g transform="translate(102 104) rotate(28)">
      <rect x="-10" y="-6" width="20" height="12" rx="2" fill="url(#cash)" stroke="#14532d" stroke-width="0.8" opacity="0.85"/>
      <text x="0" y="3" text-anchor="middle" font-size="7" font-weight="900" fill="#14532d">$</text>
    </g>
  </g>

  <!-- Gold coins spilling at bottom -->
  <g>
    <circle cx="32" cy="116" r="6" fill="url(#stubGold)" stroke="#78350f" stroke-width="1"/>
    <text x="32" y="119" text-anchor="middle" font-size="7" font-weight="900" fill="#78350f">$</text>
    <circle cx="48" cy="118" r="4" fill="#fbbf24" stroke="#78350f" stroke-width="0.7" opacity="0.85"/>
  </g>
</svg>
