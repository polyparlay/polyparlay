<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif">
  <!-- STYLE A: Reference #1 (BOOM!) — classic 3-layer: blue jagged outer
       + yellow cloud inner + red 3D-extruded italic text. -->

  <!-- Paper background -->
  <rect width="128" height="128" fill="#f5f1e8" rx="22"/>

  <!-- Blue jagged starburst outer — 11 sharp irregular spikes -->
  <g transform="rotate(-7 64 64)">
    <path d="M 64 4
             L 78 26 L 104 6 L 96 32 L 124 18 L 102 44
             L 126 64 L 102 84 L 124 110 L 96 96 L 104 122
             L 78 102 L 64 124 L 50 102 L 24 122 L 32 96
             L 4 110 L 26 84 L 2 64 L 26 44 L 4 18
             L 32 32 L 24 6 L 50 26 Z"
          fill="#1d4ed8" stroke="#0a0c14" stroke-width="4.5"
          stroke-linejoin="miter" stroke-miterlimit="3"/>
  </g>

  <!-- Yellow scalloped cloud inner -->
  <path d="M 64 28
           Q 82 20 90 36
           Q 106 40 96 56
           Q 110 70 92 80
           Q 92 98 74 94
           Q 64 108 54 94
           Q 36 98 36 80
           Q 18 70 32 56
           Q 22 40 38 36
           Q 46 20 64 28 Z"
        fill="#fde047" stroke="#0a0c14" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Text: POLY + PARLAY stacked, 3D-extruded italic red -->
  <g transform="skewX(-14)" font-weight="900" text-anchor="middle">
    <!-- POLY -->
    <g>
      <text x="76" y="60" font-size="26" fill="#0a0c14" letter-spacing="-1" dx="3" dy="3">POLY</text>
      <text x="76" y="60" font-size="26" stroke="#0a0c14" stroke-width="6"
            stroke-linejoin="round" fill="#0a0c14" letter-spacing="-1">POLY</text>
      <text x="76" y="60" font-size="26" fill="#dc2626" letter-spacing="-1">POLY</text>
    </g>
    <!-- PARLAY! -->
    <g>
      <text x="76" y="96" font-size="30" fill="#0a0c14" letter-spacing="-2" dx="3" dy="3">PARLAY!</text>
      <text x="76" y="96" font-size="30" stroke="#0a0c14" stroke-width="6"
            stroke-linejoin="round" fill="#0a0c14" letter-spacing="-2">PARLAY!</text>
      <text x="76" y="96" font-size="30" fill="#dc2626" letter-spacing="-2">PARLAY!</text>
    </g>
  </g>
</svg>
