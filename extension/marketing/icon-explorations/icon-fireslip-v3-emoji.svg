<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="bigFlame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="35%" stop-color="#f97316"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="midFlame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="tinySlip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#aura)" rx="28" ry="28"/>

  <!-- DOMINANT 🔥 flame, centered and large, emoji-styled with asymmetric tongue -->
  <g transform="translate(64 70)">
    <!-- Outer red flame body -->
    <path d="M-4 -52
             C 12 -42, 22 -22, 18 -6
             C 28 -10, 34 8, 28 22
             C 34 30, 26 42, 14 40
             C 4 36, -6 30, -14 38
             C -26 34, -34 18, -26 6
             C -38 -2, -38 -22, -24 -28
             C -16 -34, -12 -42, -4 -52 Z"
          fill="url(#bigFlame)"/>
    <!-- Middle orange-yellow flame -->
    <path d="M2 -32
             C 14 -24, 18 -8, 14 4
             C 20 4, 22 16, 16 24
             C 10 26, 0 24, -8 26
             C -16 22, -22 12, -18 2
             C -24 -2, -22 -16, -14 -20
             C -8 -22, -4 -28, 2 -32 Z"
          fill="url(#midFlame)"/>
    <!-- Hot yellow-white core -->
    <path d="M0 -16
             C 8 -10, 10 0, 6 8
             C 8 14, 0 18, -6 14
             C -10 8, -10 -2, -6 -10
             C -3 -13, -1 -15, 0 -16 Z"
          fill="#fef3c7" opacity="0.95"/>
  </g>

  <!-- Small parlay slip in front of the flame's lower-right, like emoji + ticket combo -->
  <g transform="translate(78 80) rotate(8)">
    <path d="M-12 -16 L12 -16 L12 12
             L9 16 L6 12 L3 16 L0 12 L-3 16 L-6 12 L-9 16 L-12 12 Z"
          fill="url(#tinySlip)" stroke="#7c2d12" stroke-width="1.5"/>
    <!-- Header band -->
    <rect x="-10" y="-13" width="20" height="3" rx="1" fill="#7c2d12"/>
    <!-- Body lines -->
    <rect x="-10" y="-7" width="16" height="1.8" rx="0.9" fill="#1a1f3a"/>
    <rect x="-10" y="-3" width="12" height="1.5" rx="0.75" fill="#6366f1" opacity="0.75"/>
    <rect x="-10" y="1" width="16" height="1.8" rx="0.9" fill="#1a1f3a"/>
    <rect x="-10" y="5" width="10" height="1.5" rx="0.75" fill="#6366f1" opacity="0.75"/>
    <!-- HOT win badge -->
    <circle cx="-12" cy="-16" r="6" fill="#22c55e" stroke="#0a0c14" stroke-width="1.2"/>
    <text x="-12" y="-13" text-anchor="middle" font-family="-apple-system, sans-serif"
          font-size="9" font-weight="900" fill="#0a0c14">✓</text>
  </g>
</svg>
