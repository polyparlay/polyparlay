<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="flameRed" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="60%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="flameOrange" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="flameYellow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="tinySlip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#aura)" rx="28" ry="28"/>

  <!-- ============================================================
       Dominant 🔥-emoji style flame. THREE pointed tongues at top,
       sharp notches between them, asymmetric S-curve on the left.
       Scaled large (the hero shape of the icon).
       ============================================================ -->
  <g transform="translate(64 68)">

    <!-- OUTER RED — full silhouette with three tongues -->
    <path d="M -22 50
             C -42 36 -46 8 -32 -12
             C -24 -24 -28 -40 -16 -52
             C -12 -44 -6 -42 -2 -48
             C  2 -60 12 -64 16 -58
             C 20 -50 18 -36 12 -24
             C 18 -32 30 -32 30 -18
             C 30 -6 24  4 30 12
             C 42 22 42 42 26 50
             C 14 56  0 58 -22 50 Z"
          fill="url(#flameRed)"/>

    <!-- MIDDLE ORANGE — same shape, inset -->
    <path d="M -14 42
             C -30 30 -32 10 -22 -6
             C -16 -16 -18 -28 -10 -38
             C -6 -32 -2 -30 0 -34
             C  4 -44 10 -46 12 -40
             C 14 -32 12 -22  8 -14
             C 14 -20 22 -20 22 -10
             C 22  0 18  6 22 12
             C 30 18 30 32 18 40
             C 10 44  0 46 -14 42 Z"
          fill="url(#flameOrange)"/>

    <!-- INNER YELLOW — hot core, tongue-shaped -->
    <path d="M -6 30
             C -16 22 -16  6 -10 -4
             C -6 -10 -8 -16 -4 -22
             C -1 -18  2 -16  3 -20
             C  6 -26 10 -24  9 -16
             C  8  -8  6  -2  9  4
             C 14  8 14 22  6 28
             C  2 32 -6 32 -6 30 Z"
          fill="url(#flameYellow)" opacity="0.96"/>

    <!-- White-hot center spark -->
    <ellipse cx="0" cy="6" rx="4" ry="9" fill="#ffffff" opacity="0.65"/>
  </g>

  <!-- Tiny slip + green ✓ peeking from the lower right of the flame -->
  <g transform="translate(82 92) rotate(8)">
    <path d="M-10 -14 L10 -14 L10 10
             L7 14 L4 10 L1 14 L-2 10 L-5 14 L-8 10 L-10 12 Z"
          fill="url(#tinySlip)" stroke="#7c2d12" stroke-width="1.4"/>
    <rect x="-8" y="-12" width="16" height="3" rx="1" fill="#7c2d12"/>
    <rect x="-8" y="-6" width="13" height="1.6" rx="0.8" fill="#1a1f3a"/>
    <rect x="-8" y="-3" width="10" height="1.4" rx="0.7" fill="#6366f1" opacity="0.75"/>
    <rect x="-8" y="1" width="13" height="1.6" rx="0.8" fill="#1a1f3a"/>
    <!-- WIN check badge -->
    <circle cx="-10" cy="-14" r="6" fill="#22c55e" stroke="#0a0c14" stroke-width="1.2"/>
    <path d="M-13 -14 L-11 -12 L-7 -16" fill="none" stroke="#0a0c14" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
