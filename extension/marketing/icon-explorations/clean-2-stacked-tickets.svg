<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- CLEAN OPTION 2: Three stacked parlay tickets, fanned at slight
       angles. Semantically tied to the product (parlay slip = the thing
       PolyParlay builds). Single-color background, white tickets with
       clear shadow stacking and a green WIN check on the front one. -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg2)" rx="22"/>

  <!-- Back ticket (rotated -12°) -->
  <g transform="translate(64 66) rotate(-12)">
    <path d="M -22 -32 L 22 -32 L 22 26
             L 18 30 L 14 26 L 10 30 L 6 26 L 2 30 L -2 26 L -6 30
             L -10 26 L -14 30 L -18 26 L -22 30 Z"
          fill="#a5b4fc" opacity="0.55"
          stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Middle ticket (flat, central) -->
  <g transform="translate(64 64)">
    <path d="M -22 -32 L 22 -32 L 22 26
             L 18 30 L 14 26 L 10 30 L 6 26 L 2 30 L -2 26 L -6 30
             L -10 26 L -14 30 L -18 26 L -22 30 Z"
          fill="#e0e7ff"
          stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Front ticket (rotated +10°, brightest, with content) -->
  <g transform="translate(64 62) rotate(10)">
    <path d="M -22 -32 L 22 -32 L 22 26
             L 18 30 L 14 26 L 10 30 L 6 26 L 2 30 L -2 26 L -6 30
             L -10 26 L -14 30 L -18 26 L -22 30 Z"
          fill="#ffffff"
          stroke="#312e81" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Header strip (green = win) -->
    <rect x="-18" y="-28" width="36" height="6" rx="2" fill="#22c55e"/>

    <!-- Body content rows -->
    <rect x="-17" y="-17" width="26" height="3" rx="1.5" fill="#1e1b4b"/>
    <rect x="-17" y="-11" width="18" height="2.5" rx="1.25" fill="#6366f1" opacity="0.7"/>
    <rect x="-17" y="-4" width="26" height="3" rx="1.5" fill="#1e1b4b"/>
    <rect x="-17" y="2" width="20" height="2.5" rx="1.25" fill="#6366f1" opacity="0.7"/>
    <rect x="-17" y="9" width="26" height="3" rx="1.5" fill="#1e1b4b"/>
    <rect x="-17" y="15" width="16" height="2.5" rx="1.25" fill="#6366f1" opacity="0.7"/>

    <!-- Big green check at the bottom-right corner -->
    <circle cx="15" cy="-25" r="6" fill="#22c55e" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 12 -25 L 14 -23 L 18 -27" fill="none" stroke="#ffffff"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
