<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="chestWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="chestWoodLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="ticket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="treasureGlow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <!-- Gold light pouring up out of chest -->
  <rect width="128" height="128" fill="url(#treasureGlow)" rx="28" ry="28"/>

  <!-- Gold rays bursting up -->
  <g opacity="0.5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
    <line x1="64" y1="14" x2="64" y2="38"/>
    <line x1="36" y1="22" x2="48" y2="40"/>
    <line x1="92" y1="22" x2="80" y2="40"/>
    <line x1="22" y1="40" x2="40" y2="48"/>
    <line x1="106" y1="40" x2="88" y2="48"/>
  </g>

  <!-- Chest body (bottom half) -->
  <g>
    <!-- Lower body -->
    <rect x="22" y="76" width="84" height="34" rx="4" fill="url(#chestWood)" stroke="#451a03" stroke-width="1.5"/>
    <!-- Iron bands -->
    <rect x="20" y="84" width="88" height="4" fill="#1c1917" opacity="0.85"/>
    <rect x="20" y="100" width="88" height="4" fill="#1c1917" opacity="0.85"/>
    <!-- Bottom-center lock plate -->
    <rect x="58" y="92" width="12" height="14" rx="1" fill="#fbbf24" stroke="#78350f" stroke-width="1"/>
    <circle cx="64" cy="99" r="2" fill="#78350f"/>
  </g>

  <!-- Open lid (tilted back) -->
  <g transform="translate(64 64) rotate(-22)">
    <path d="M-44 -14 L44 -14 L44 6 Q44 14 36 14 L-36 14 Q-44 14 -44 6 Z"
          fill="url(#chestWoodLid)" stroke="#451a03" stroke-width="1.5"/>
    <!-- Iron band on lid -->
    <rect x="-46" y="-2" width="92" height="3.5" fill="#1c1917" opacity="0.85"/>
    <!-- Lid hinges -->
    <rect x="-28" y="-14" width="6" height="6" fill="#1c1917"/>
    <rect x="22" y="-14" width="6" height="6" fill="#1c1917"/>
  </g>

  <!-- Parlay ticket bursting out (centered, tilted) -->
  <g transform="translate(56 60) rotate(-12)">
    <path d="M-12 -22 L12 -22 L12 16
             L9 20 L6 16 L3 20 L0 16 L-3 20 L-6 16 L-9 20 L-12 16 Z"
          fill="url(#ticket)" stroke="#92400e" stroke-width="1.2"/>
    <rect x="-10" y="-19" width="20" height="3" rx="1" fill="#22c55e" opacity="0.85"/>
    <rect x="-10" y="-12" width="16" height="1.6" rx="0.8" fill="#1a1f3a"/>
    <rect x="-10" y="-7" width="12" height="1.4" rx="0.7" fill="#6366f1" opacity="0.75"/>
    <rect x="-10" y="-2" width="16" height="1.6" rx="0.8" fill="#1a1f3a"/>
    <rect x="-10" y="3" width="10" height="1.4" rx="0.7" fill="#6366f1" opacity="0.75"/>
    <rect x="-10" y="8" width="14" height="1.6" rx="0.8" fill="#1a1f3a"/>
  </g>

  <!-- Gold coins flying out -->
  <g>
    <circle cx="84" cy="48" r="8" fill="url(#gold)" stroke="#78350f" stroke-width="1.2"/>
    <text x="84" y="52" text-anchor="middle" font-family="-apple-system, sans-serif"
          font-size="11" font-weight="900" fill="#78350f">$</text>
  </g>
  <g>
    <circle cx="94" cy="68" r="6" fill="url(#gold)" stroke="#78350f" stroke-width="1"/>
    <text x="94" y="71" text-anchor="middle" font-family="-apple-system, sans-serif"
          font-size="8" font-weight="900" fill="#78350f">$</text>
  </g>
  <g>
    <circle cx="34" cy="52" r="5" fill="url(#gold)" stroke="#78350f" stroke-width="1" opacity="0.85"/>
  </g>
</svg>
