<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="stub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Emoji-style fire: red base, orange mid, yellow tip -->
    <linearGradient id="flameRed" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="55%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="flameOrange" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="flameYellow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="heat" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#heat)" rx="28" ry="28"/>

  <!-- ============================================================
       EMOJI-STYLE FIRE rising behind the ticket. Three-tongue tip,
       sharp notches between peaks, asymmetric left S-flick.
       ============================================================ -->
  <g transform="translate(64 64)">

    <!-- OUTER RED LAYER — the full flame silhouette -->
    <path d="M -14 38
             C -28 26 -32 6 -22 -10
             C -16 -20 -20 -32 -12 -42
             C -8 -36 -4 -34 -2 -38
             C  0 -46  6 -52 10 -48
             C 14 -42 14 -32 10 -22
             C 14 -28 22 -28 22 -18
             C 22 -8 18  0 22  6
             C 30 12 30 26 20 34
             C 12 40  2 42 -14 38 Z"
          fill="url(#flameRed)"/>

    <!-- MIDDLE ORANGE LAYER — sits inside, slightly smaller, same shape -->
    <path d="M -8 32
             C -20 22 -22 6 -14 -6
             C -10 -14 -12 -22  -6 -30
             C -3 -26 0 -24 2 -28
             C  4 -34 8 -38 10 -34
             C 12 -28 12 -22 8 -16
             C 12 -20 18 -20 18 -12
             C 18 -4 14  2 18  6
             C 24 12 24 22 16 28
             C 10 32  2 34 -8 32 Z"
          fill="url(#flameOrange)"/>

    <!-- INNER YELLOW LAYER — the hot tongue core -->
    <path d="M -2 22
             C -10 14 -10  2 -4 -6
             C -2 -10 -2 -18  2 -22
             C  4 -18  6 -16  6 -18
             C  8 -22 10 -22 10 -16
             C 10 -10  8  -4 10  0
             C 14  4 14 14  8 20
             C  4 22 -2 22 -2 22 Z"
          fill="url(#flameYellow)" opacity="0.96"/>

    <!-- White-hot core spark -->
    <ellipse cx="2" cy="2" rx="3" ry="6" fill="#ffffff" opacity="0.7"/>

  </g>

  <!-- ============================================================
       TICKET in front, with perforated tear-line and ×3.2 stub
       ============================================================ -->
  <g transform="translate(64 70)">
    <!-- Drop shadow under ticket -->
    <rect x="-25" y="-37" width="50" height="74" rx="4" fill="#000" opacity="0.4" transform="translate(3 3)"/>

    <!-- BODY (top half) -->
    <rect x="-25" y="-37" width="50" height="38" rx="4 4 0 0" fill="url(#paper)" stroke="#92400e" stroke-width="1.5"/>
    <!-- Header strip -->
    <rect x="-23" y="-35" width="46" height="6" rx="1.5" fill="#22c55e"/>
    <text x="0" y="-30.5" text-anchor="middle" font-size="5" font-weight="900"
          fill="#0a0c14" letter-spacing="1">PARLAY</text>
    <!-- Leg rows -->
    <rect x="-21" y="-23" width="32" height="2.2" rx="1.1" fill="#1a1f3a"/>
    <rect x="-21" y="-19" width="22" height="1.8" rx="0.9" fill="#6366f1" opacity="0.75"/>
    <rect x="-21" y="-14" width="32" height="2.2" rx="1.1" fill="#1a1f3a"/>
    <rect x="-21" y="-10" width="18" height="1.8" rx="0.9" fill="#6366f1" opacity="0.75"/>
    <rect x="-21" y="-5" width="32" height="2.2" rx="1.1" fill="#1a1f3a"/>
    <!-- Green stamps -->
    <circle cx="17" cy="-22" r="2.4" fill="#22c55e" opacity="0.85"/>
    <circle cx="17" cy="-13" r="2.4" fill="#22c55e" opacity="0.85"/>
    <circle cx="17" cy="-4" r="2.4" fill="#22c55e" opacity="0.85"/>

    <!-- Perforated tear-line -->
    <line x1="-25" y1="-1" x2="25" y2="-1" stroke="#92400e" stroke-width="1" stroke-dasharray="2 2.5" opacity="0.85"/>
    <!-- Side notches (cut-outs) where perforation tears -->
    <circle cx="-25" cy="-1" r="2.5" fill="url(#bg)"/>
    <circle cx="25" cy="-1" r="2.5" fill="url(#bg)"/>

    <!-- STUB (bottom half — payout) -->
    <rect x="-25" y="1" width="50" height="36" rx="0 0 4 4" fill="url(#stub)" stroke="#92400e" stroke-width="1.5"/>
    <!-- Big × multiplier -->
    <text x="0" y="20" text-anchor="middle" font-size="20" font-weight="900"
          fill="#7c2d12" letter-spacing="-0.5">×3.2</text>
    <!-- Subline -->
    <text x="0" y="30" text-anchor="middle" font-size="5" font-weight="800"
          fill="#92400e" letter-spacing="1.5">$32 PAYOUT</text>
  </g>

  <!-- Tip of the flame peeking ABOVE the ticket header (final emoji-style flick) -->
  <g transform="translate(64 24)">
    <path d="M 0 8
             C -4 0 -3 -8 0 -12
             C 1 -8 3 -6 4 -10
             C 6 -14 8 -10 7 -4
             C 6 0 5 4 6 8
             C 4 12 -2 12 0 8 Z"
          fill="url(#flameYellow)" opacity="0.95"/>
  </g>
</svg>
