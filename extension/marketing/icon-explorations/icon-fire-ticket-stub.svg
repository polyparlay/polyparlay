<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="stub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="flameOuter" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="heat" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#heat)" rx="28" ry="28"/>

  <!-- LEFT-side flame plume (behind the ticket) -->
  <g transform="translate(28 64)">
    <path d="M0 -36
             C 10 -28, 14 -14, 12 -2
             C 16 -4, 20 6, 16 14
             C 18 18, 12 22, 6 20
             C 0 18, -6 14, -12 18
             C -18 16, -22 8, -18 0
             C -22 -4, -22 -16, -14 -22
             C -8 -26, -4 -30, 0 -36 Z"
          fill="url(#flameOuter)"/>
    <path d="M-2 -22
             C 6 -16, 8 -4, 6 4
             C 8 8, 2 14, -4 12
             C -10 10, -12 4, -10 -2
             C -12 -8, -8 -16, -2 -22 Z"
          fill="url(#flameInner)" opacity="0.92"/>
  </g>
  <!-- RIGHT-side flame plume (behind the ticket) -->
  <g transform="translate(100 60)">
    <path d="M0 -38
             C 12 -28, 16 -12, 12 0
             C 16 -2, 20 8, 16 16
             C 18 20, 12 24, 4 22
             C -2 20, -8 14, -14 18
             C -20 14, -22 6, -18 -2
             C -24 -8, -22 -20, -12 -24
             C -6 -28, -2 -34, 0 -38 Z"
          fill="url(#flameOuter)" opacity="0.95"/>
    <path d="M-2 -22
             C 6 -16, 8 -4, 6 4
             C 8 8, 2 12, -4 10
             C -10 8, -12 0, -8 -8
             C -6 -16, -4 -20, -2 -22 Z"
          fill="url(#flameInner)" opacity="0.88"/>
  </g>

  <!-- TICKET (vertical slip with perforated stub) — front and center -->
  <g transform="translate(64 64)">
    <!-- Drop shadow under ticket -->
    <rect x="-25" y="-37" width="50" height="74" rx="4" fill="#000" opacity="0.35" transform="translate(3 3)"/>

    <!-- Body (top half of ticket) -->
    <rect x="-25" y="-37" width="50" height="38" rx="4 4 0 0" fill="url(#paper)" stroke="#92400e" stroke-width="1.5"/>
    <!-- Header strip -->
    <rect x="-23" y="-35" width="46" height="6" rx="1.5" fill="#22c55e"/>
    <text x="0" y="-30.5" text-anchor="middle" font-size="5" font-weight="900"
          fill="#0a0c14" letter-spacing="1">PARLAY</text>
    <!-- Leg rows -->
    <rect x="-21" y="-23" width="32" height="2.2" rx="1.1" fill="#1a1f3a"/>
    <rect x="-21" y="-19" width="22" height="1.8" rx="0.9" fill="#6366f1" opacity="0.75"/>
    <rect x="-21" y="-14" width="32" height="2.2" rx="1.1" fill="#1a1f3a"/>
    <rect x="-21" y="-10" width="18" height="1.8" rx="0.9" fill="#6366f1" opacity="0.75"/>
    <rect x="-21" y="-5" width="32" height="2.2" rx="1.1" fill="#1a1f3a"/>
    <!-- $ stamps next to each leg -->
    <circle cx="17" cy="-22" r="2.4" fill="#22c55e" opacity="0.85"/>
    <circle cx="17" cy="-13" r="2.4" fill="#22c55e" opacity="0.85"/>
    <circle cx="17" cy="-4" r="2.4" fill="#22c55e" opacity="0.85"/>

    <!-- Perforated tear-line — the icon's signature element -->
    <line x1="-25" y1="-1" x2="25" y2="-1" stroke="#92400e" stroke-width="1" stroke-dasharray="2 2.5" opacity="0.85"/>
    <!-- Side notches where the perforation tears -->
    <circle cx="-25" cy="-1" r="2.5" fill="url(#bg)"/>
    <circle cx="25" cy="-1" r="2.5" fill="url(#bg)"/>

    <!-- Stub (bottom half — the payout / multiplier) -->
    <rect x="-25" y="1" width="50" height="36" rx="0 0 4 4" fill="url(#stub)" stroke="#92400e" stroke-width="1.5"/>
    <!-- Big × multiplier on the stub -->
    <text x="0" y="20" text-anchor="middle" font-size="20" font-weight="900"
          fill="#7c2d12" letter-spacing="-0.5">×3.2</text>
    <!-- Subline -->
    <text x="0" y="30" text-anchor="middle" font-size="5" font-weight="800"
          fill="#92400e" letter-spacing="1.5">$32 PAYOUT</text>
  </g>

  <!-- Top flame curl rising from behind the ticket header -->
  <g transform="translate(64 16)">
    <path d="M0 -2
             C 6 4, 6 12, 4 18
             C 0 20, -4 18, -6 12
             C -8 6, -4 0, 0 -2 Z"
          fill="url(#flameOuter)" opacity="0.95"/>
    <path d="M-1 4
             C 3 8, 3 14, 1 18
             C -2 18, -4 14, -3 10
             C -3 6, -2 4, -1 4 Z"
          fill="url(#flameInner)" opacity="0.95"/>
  </g>
</svg>
