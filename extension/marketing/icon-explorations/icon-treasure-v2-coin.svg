<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <radialGradient id="goldFace" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="35%" stop-color="#fde68a"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#a16207"/>
    </radialGradient>
    <radialGradient id="goldEdge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="ticketOnFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#goldGlow)" rx="28" ry="28"/>

  <!-- Sparkles around the coin -->
  <g fill="#fef3c7">
    <path d="M16 24 L18 28 L22 30 L18 32 L16 36 L14 32 L10 30 L14 28 Z" opacity="0.75"/>
    <path d="M108 32 L109 35 L112 36 L109 37 L108 40 L107 37 L104 36 L107 35 Z" opacity="0.6"/>
    <path d="M100 96 L102 100 L106 102 L102 104 L100 108 L98 104 L94 102 L98 100 Z" opacity="0.7"/>
  </g>

  <!-- BIG gold coin (the hero shape) -->
  <g transform="translate(64 64)">
    <!-- Edge / rim -->
    <circle r="48" fill="url(#goldEdge)"/>
    <!-- Edge thickness ring -->
    <circle r="48" fill="none" stroke="#451a03" stroke-width="2"/>
    <!-- Face -->
    <circle r="42" fill="url(#goldFace)" stroke="#78350f" stroke-width="1.5"/>
    <!-- Ridged edge dots -->
    <g fill="#92400e" opacity="0.7">
      <circle cx="0" cy="-46" r="0.8"/>
      <circle cx="32" cy="-33" r="0.8"/>
      <circle cx="46" cy="0" r="0.8"/>
      <circle cx="32" cy="33" r="0.8"/>
      <circle cx="0" cy="46" r="0.8"/>
      <circle cx="-32" cy="33" r="0.8"/>
      <circle cx="-46" cy="0" r="0.8"/>
      <circle cx="-32" cy="-33" r="0.8"/>
    </g>

    <!-- Parlay slip ticket imprinted on the coin face -->
    <g transform="translate(0 0)">
      <!-- Ticket shape -->
      <path d="M-18 -22 L18 -22 L18 18
               L14 22 L10 18 L6 22 L2 18 L-2 22 L-6 18 L-10 22 L-14 18 L-18 22 Z"
            fill="url(#ticketOnFace)" stroke="#78350f" stroke-width="1.2"/>
      <!-- Header bar (green = WIN) -->
      <rect x="-15" y="-19" width="30" height="4" rx="1.5" fill="#22c55e"/>
      <!-- Body rows -->
      <rect x="-14" y="-11" width="20" height="2.2" rx="1" fill="#1a1f3a"/>
      <rect x="-14" y="-6" width="15" height="1.8" rx="0.9" fill="#6366f1" opacity="0.7"/>
      <rect x="-14" y="-1" width="20" height="2.2" rx="1" fill="#1a1f3a"/>
      <rect x="-14" y="4" width="13" height="1.8" rx="0.9" fill="#6366f1" opacity="0.7"/>
      <rect x="-14" y="9" width="20" height="2.2" rx="1" fill="#1a1f3a"/>
      <!-- Dollar stamp in corner -->
      <circle cx="13" cy="-15" r="3.5" fill="#fbbf24" stroke="#78350f" stroke-width="0.8"/>
      <text x="13" y="-13" text-anchor="middle" font-family="-apple-system, sans-serif"
            font-size="6" font-weight="900" fill="#78350f">$</text>
    </g>

    <!-- Top-left highlight (gives the coin dimensionality) -->
    <ellipse cx="-18" cy="-22" rx="14" ry="6" fill="#ffffff" opacity="0.35"/>
  </g>
</svg>
