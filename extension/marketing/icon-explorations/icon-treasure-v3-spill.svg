<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="ticket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="coinFace" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <linearGradient id="cashStack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="payoutGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>
  <rect width="128" height="128" fill="url(#payoutGlow)" rx="28" ry="28"/>

  <!-- Action lines / motion radials -->
  <g stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <line x1="20" y1="20" x2="30" y2="30"/>
    <line x1="108" y1="22" x2="98" y2="32"/>
    <line x1="14" y1="64" x2="26" y2="64"/>
    <line x1="102" y1="64" x2="114" y2="64"/>
  </g>

  <!-- Tilted parlay slip — leaning, like a slot-machine win moment -->
  <g transform="translate(64 60) rotate(-12)">
    <!-- Stack shadow -->
    <path d="M-22 -28 L22 -28 L22 24
             L18 28 L14 24 L10 28 L6 24 L2 28 L-2 24 L-6 28 L-10 24 L-14 28 L-18 24 L-22 28 Z"
          fill="#92400e" opacity="0.4" transform="translate(5 5)"/>
    <!-- Main slip -->
    <path d="M-22 -28 L22 -28 L22 24
             L18 28 L14 24 L10 28 L6 24 L2 28 L-2 24 L-6 28 L-10 24 L-14 28 L-18 24 L-22 28 Z"
          fill="url(#ticket)" stroke="#92400e" stroke-width="1.8"/>
    <!-- Header WIN strip -->
    <rect x="-18" y="-24" width="36" height="6" rx="2" fill="#22c55e"/>
    <text x="0" y="-19" text-anchor="middle" font-family="-apple-system, sans-serif"
          font-size="6" font-weight="900" fill="#0a0c14" letter-spacing="1">WIN</text>
    <!-- Body content -->
    <rect x="-18" y="-13" width="28" height="2.5" rx="1.25" fill="#1a1f3a"/>
    <rect x="-18" y="-7" width="20" height="2" rx="1" fill="#6366f1" opacity="0.75"/>
    <rect x="-18" y="-1" width="28" height="2.5" rx="1.25" fill="#1a1f3a"/>
    <rect x="-18" y="5" width="22" height="2" rx="1" fill="#6366f1" opacity="0.75"/>
    <rect x="-18" y="11" width="28" height="2.5" rx="1.25" fill="#1a1f3a"/>
    <!-- Multiplier stamp -->
    <g transform="translate(13 16)">
      <circle r="6" fill="#fbbf24" stroke="#78350f" stroke-width="1"/>
      <text x="0" y="2.5" text-anchor="middle" font-family="-apple-system, sans-serif"
            font-size="7" font-weight="900" fill="#78350f">3×</text>
    </g>
  </g>

  <!-- Gold coins spilling out the bottom of the slip -->
  <g>
    <!-- Coin 1 (largest, foreground) -->
    <g transform="translate(80 96)">
      <circle r="10" fill="url(#coinFace)" stroke="#78350f" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, sans-serif"
            font-size="11" font-weight="900" fill="#78350f">$</text>
    </g>
    <!-- Coin 2 (middle) -->
    <g transform="translate(46 100)">
      <circle r="8" fill="url(#coinFace)" stroke="#78350f" stroke-width="1.2"/>
      <text x="0" y="2.5" text-anchor="middle" font-family="-apple-system, sans-serif"
            font-size="9" font-weight="900" fill="#78350f">$</text>
    </g>
    <!-- Coin 3 (smaller, back) -->
    <g transform="translate(64 110)">
      <circle r="6" fill="url(#coinFace)" stroke="#78350f" stroke-width="1" opacity="0.92"/>
    </g>
    <!-- Coin 4 (tiny, edge) -->
    <g transform="translate(98 110)">
      <ellipse rx="5" ry="2" fill="#fbbf24" stroke="#78350f" stroke-width="0.8" opacity="0.9"/>
    </g>
    <!-- Coin 5 (tiny, other edge) -->
    <g transform="translate(28 116)">
      <ellipse rx="4" ry="1.5" fill="#fbbf24" stroke="#78350f" stroke-width="0.7" opacity="0.85"/>
    </g>
  </g>

  <!-- Green cash bill peeking from behind the slip (top-right) -->
  <g transform="translate(96 32) rotate(18)">
    <rect x="-12" y="-7" width="24" height="14" rx="2" fill="url(#cashStack)" stroke="#14532d" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="-apple-system, sans-serif"
          font-size="8" font-weight="900" fill="#14532d">$</text>
  </g>
</svg>
