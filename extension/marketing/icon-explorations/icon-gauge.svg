<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Gauge track (semi-circle) -->
  <!-- Red zone (left third) -->
  <path d="M22 82 A42 42 0 0 1 50 44"
        fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <!-- Yellow zone (middle) -->
  <path d="M50 44 A42 42 0 0 1 78 44"
        fill="none" stroke="#fbbf24" stroke-width="14" opacity="0.85"/>
  <!-- Green zone (right) -->
  <path d="M78 44 A42 42 0 0 1 106 82"
        fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>

  <!-- Needle pointing into green zone -->
  <line x1="64" y1="82" x2="94" y2="50"
        stroke="#f9fafb" stroke-width="5" stroke-linecap="round"/>
  <circle cx="64" cy="82" r="7" fill="#f9fafb"/>
  <circle cx="64" cy="82" r="3" fill="#0a0c14"/>

  <!-- Tiny "WIN%" label -->
  <text x="64" y="108" text-anchor="middle"
        font-size="13" font-weight="900" fill="#22c55e" letter-spacing="2">WIN%</text>
</svg>
