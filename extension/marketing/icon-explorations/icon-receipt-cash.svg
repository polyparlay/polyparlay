<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="cash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="slip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg)" rx="28" ry="28"/>

  <!-- Slip body (anchored at bottom) -->
  <g>
    <!-- back slip shadow -->
    <path d="M44 50 L84 50 L84 110
             L78 116 L72 110 L66 116 L60 110 L54 116 L48 110 L44 116 Z"
          fill="#94a3b8" opacity="0.3" transform="translate(4 2)"/>
    <!-- front slip -->
    <path d="M40 46 L80 46 L80 106
             L74 112 L68 106 L62 112 L56 106 L50 112 L46 106 L40 112 Z"
          fill="url(#slip)" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- rows -->
    <rect x="46" y="68" width="28" height="3" rx="1.5" fill="#1a1f3a"/>
    <rect x="46" y="76" width="22" height="3" rx="1.5" fill="#6366f1" opacity="0.8"/>
    <rect x="46" y="84" width="28" height="3" rx="1.5" fill="#1a1f3a"/>
    <rect x="46" y="92" width="20" height="3" rx="1.5" fill="#6366f1" opacity="0.8"/>
    <!-- header label -->
    <rect x="46" y="54" width="28" height="6" rx="2" fill="#22c55e" opacity="0.65"/>
  </g>

  <!-- Cash bursting OUT the top of the slip -->
  <!-- Bill 1 (back, tilted left) -->
  <g transform="translate(36 26) rotate(-22)">
    <rect x="-14" y="-9" width="28" height="18" rx="2.5" fill="url(#cash)" stroke="#14532d" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="900" fill="#14532d">$</text>
  </g>
  <!-- Bill 2 (center, top) -->
  <g transform="translate(60 16)">
    <rect x="-16" y="-10" width="32" height="20" rx="3" fill="url(#cash)" stroke="#14532d" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#14532d" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="12" font-weight="900" fill="#14532d">$</text>
  </g>
  <!-- Bill 3 (front, tilted right) -->
  <g transform="translate(86 26) rotate(20)">
    <rect x="-14" y="-9" width="28" height="18" rx="2.5" fill="url(#cash)" stroke="#14532d" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="900" fill="#14532d">$</text>
  </g>

  <!-- Up arrow flair on right side -->
  <g transform="translate(102 56)">
    <line x1="0" y1="10" x2="0" y2="-10" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 -10 L-5 -3 L5 -3 Z" fill="#22c55e"/>
  </g>
</svg>
