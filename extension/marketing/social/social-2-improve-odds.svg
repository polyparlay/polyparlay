<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="dg2" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#0a0c14" fill-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#f5f1e8"/>
  <rect width="1200" height="675" fill="url(#dg2)"/>

  <!-- Top ticker -->
  <rect x="0" y="0" width="1200" height="36" fill="#0a0c14"/>
  <text x="40" y="22" font-family="'JetBrains Mono', monospace"
        font-size="12" font-weight="700" fill="#f5f1e8" letter-spacing="2.5">
    ● THE KILLER FEATURE · IMPROVE ODDS REBALANCER · ONE CLICK
  </text>
  <circle cx="46" cy="18" r="3.5" fill="#16a34a"/>

  <!-- Headline -->
  <text x="60" y="100" font-family="'JetBrains Mono', monospace"
        font-size="13" font-weight="700" fill="#4f46e5" letter-spacing="3">// THE VALUE PROP</text>
  <text x="60" y="158" font-size="54" font-weight="900" fill="#0a0c14" letter-spacing="-1.8">Your parlay sims at 4.3% win rate.</text>
  <text x="60" y="218" font-size="54" font-weight="900" fill="#0a0c14" letter-spacing="-1.8">
    One click. <tspan fill="#16a34a">25.5%.</tspan>
  </text>

  <!-- BEFORE / AFTER split -->
  <g transform="translate(60 260)">
    <!-- BEFORE card -->
    <g>
      <rect x="6" y="6" width="510" height="340" rx="14" fill="#0a0c14"/>
      <rect width="510" height="340" rx="14" fill="#fdfcf7" stroke="#0a0c14" stroke-width="2"/>

      <!-- BEFORE label -->
      <rect x="20" y="20" width="110" height="32" rx="6" fill="#fee2e2" stroke="#0a0c14" stroke-width="1.5"/>
      <text x="75" y="41" text-anchor="middle" font-family="'JetBrains Mono', monospace"
            font-size="13" font-weight="800" fill="#7f1d1d" letter-spacing="1.5">BEFORE</text>

      <!-- Big sim win rate -->
      <text x="255" y="148" text-anchor="middle" font-family="'JetBrains Mono', monospace"
            font-size="92" font-weight="900" fill="#dc2626" letter-spacing="-3">4.3%</text>
      <text x="255" y="180" text-anchor="middle" font-family="'JetBrains Mono', monospace"
            font-size="13" font-weight="700" fill="#6b6f7a" letter-spacing="2">SIM WIN RATE</text>

      <!-- Worst leg -->
      <g transform="translate(20 210)">
        <rect width="470" height="100" rx="8" fill="#ffffff" stroke="#0a0c14" stroke-width="1.5"/>
        <text x="14" y="26" font-family="'JetBrains Mono', monospace"
              font-size="10" font-weight="800" fill="#dc2626" letter-spacing="1.5">WEAK LEG · DRAGGING WIN RATE DOWN</text>
        <text x="14" y="54" font-size="18" font-weight="700" fill="#0a0c14">BTC above $100K by May 31</text>
        <text x="14" y="80" font-family="'JetBrains Mono', monospace"
              font-size="13" font-weight="600" fill="#6b6f7a">
          <tspan font-weight="800" fill="#16a34a">YES</tspan> · IMPLIED 7% · $0.93
        </text>
      </g>
    </g>

    <!-- Arrow between -->
    <g transform="translate(540 165)">
      <circle r="32" fill="#fbbf24" stroke="#0a0c14" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-size="24" font-weight="900" fill="#0a0c14">↗</text>
    </g>

    <!-- AFTER card -->
    <g transform="translate(580 0)">
      <rect x="6" y="6" width="510" height="340" rx="14" fill="#16a34a"/>
      <rect width="510" height="340" rx="14" fill="#fdfcf7" stroke="#0a0c14" stroke-width="2"/>

      <!-- AFTER label -->
      <rect x="20" y="20" width="110" height="32" rx="6" fill="#dcfce7" stroke="#0a0c14" stroke-width="1.5"/>
      <text x="75" y="41" text-anchor="middle" font-family="'JetBrains Mono', monospace"
            font-size="13" font-weight="800" fill="#14532d" letter-spacing="1.5">AFTER</text>

      <!-- Big sim win rate after -->
      <text x="255" y="148" text-anchor="middle" font-family="'JetBrains Mono', monospace"
            font-size="92" font-weight="900" fill="#16a34a" letter-spacing="-3">25.5%</text>
      <text x="255" y="180" text-anchor="middle" font-family="'JetBrains Mono', monospace"
            font-size="13" font-weight="700" fill="#6b6f7a" letter-spacing="2">SIM WIN RATE</text>

      <!-- Flipped leg -->
      <g transform="translate(20 210)">
        <rect width="470" height="100" rx="8" fill="#ffffff" stroke="#0a0c14" stroke-width="1.5"/>
        <text x="14" y="26" font-family="'JetBrains Mono', monospace"
              font-size="10" font-weight="800" fill="#16a34a" letter-spacing="1.5">↗ FLIPPED · NOW REBALANCED</text>
        <text x="14" y="54" font-size="18" font-weight="700" fill="#0a0c14">BTC above $100K by May 31</text>
        <text x="14" y="80" font-family="'JetBrains Mono', monospace"
              font-size="13" font-weight="600" fill="#6b6f7a">
          <tspan font-weight="800" fill="#dc2626">NO</tspan> · IMPLIED 93% · $0.07
        </text>
      </g>
    </g>
  </g>

  <!-- Bottom CTA -->
  <text x="600" y="630" text-anchor="middle" font-family="'JetBrains Mono', monospace"
        font-size="16" font-weight="800" fill="#0a0c14" letter-spacing="2.5">
    POLYPARLAY.APP · CHROME EXTENSION
  </text>
</svg>
