<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PolyParlay slip</title>
    <meta property="og:title" content="PolyParlay slip" />
    <meta property="og:description" content="A multi-leg parlay built on Polymarket. Information only — verify on Polymarket before trading." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
      :root {
        --bg: #0b0d12;
        --surface: #11141a;
        --line: #1e2230;
        --muted: #6b7280;
        --text: #e5e7eb;
        --strong: #f9fafb;
        --accent: #6366f1;
        --green: #22c55e;
        --red: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #0a0c12 0%, #13182a 100%);
        color: var(--text);
        min-height: 100vh;
        padding: 40px 20px;
      }
      .wrap { max-width: 720px; margin: 0 auto; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 24px;
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 700; letter-spacing: 0.4px; color: var(--strong);
      }
      .brand .dot {
        width: 12px; height: 12px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 16px rgba(99,102,241,0.6);
      }
      .install {
        background: var(--accent); color: white; text-decoration: none;
        padding: 8px 14px; border-radius: 6px; font-weight: 600; font-size: 13px;
      }
      .install:hover { filter: brightness(1.1); }

      .card {
        background: rgba(17, 20, 26, 0.7);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        backdrop-filter: blur(8px);
      }
      .card-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
        display: flex; justify-content: space-between; align-items: baseline;
      }
      .card-head h1 { margin: 0; font-size: 18px; color: var(--strong); }
      .card-head .meta { font-size: 12px; color: var(--muted); }

      .legs { list-style: none; padding: 0; margin: 0; }
      .legs li {
        display: grid;
        grid-template-columns: 32px 1fr auto;
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        align-items: center;
      }
      .legs li:last-child { border-bottom: 0; }
      .num {
        width: 28px; height: 28px; border-radius: 50%;
        background: var(--surface); color: var(--muted);
        display: flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 700;
      }
      .q { color: var(--strong); font-weight: 500; }
      .meta-line { font-size: 11px; color: var(--muted); margin-top: 3px; }
      .dir-yes { color: var(--green); font-weight: 700; }
      .dir-no { color: var(--red); font-weight: 700; }
      .price { color: var(--strong); font-weight: 700; font-size: 18px; }

      .summary {
        padding: 20px;
        background: rgba(99, 102, 241, 0.04);
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
      }
      .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
      .stat .value { font-size: 24px; color: var(--strong); font-weight: 700; margin-top: 4px; }
      .stat .value.green { color: var(--green); }

      .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
      }
      .footer a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }

      .empty {
        padding: 60px 20px;
        text-align: center;
        color: var(--muted);
      }
      .empty strong { color: var(--strong); display: block; font-size: 18px; margin-bottom: 8px; }

      @media (max-width: 600px) {
        .summary { grid-template-columns: 1fr; }
        .legs li { grid-template-columns: 28px 1fr; }
        .legs .price { grid-column: 2; text-align: right; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand"><span class="dot"></span> PolyParlay</div>
        <a class="install" href="https://polyparlay.app" target="_blank" rel="noopener">Install extension</a>
      </header>
      <main id="main"></main>
      <div class="footer">
        Information only — verify markets on
        <a href="https://polymarket.com" target="_blank" rel="noopener">Polymarket</a>
        before trading.
      </div>
    </div>

    <script>
      function decodeHash() {
        const hash = window.location.hash.replace(/^#/, '');
        if (!hash) return null;
        try {
          const padded = hash.replace(/-/g, '+').replace(/_/g, '/');
          const json = decodeURIComponent(escape(atob(padded)));
          return JSON.parse(json);
        } catch (e) {
          return null;
        }
      }
      function fmt$(n) {
        if (n == null || isNaN(n)) return '—';
        return '$' + Number(n).toFixed(2);
      }
      function fmtMult(n) {
        if (!isFinite(n) || n <= 0) return '—';
        return n.toFixed(2) + '×';
      }
      function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
      }
      // Append referral on outbound platform links
      function withRef(url) {
        if (!url) return url;
        try {
          const u = new URL(url);
          if (u.hostname.endsWith('polymarket.com') || u.hostname.endsWith('kalshi.com')) {
            if (!u.searchParams.has('ref')) u.searchParams.set('ref', 'polyparlay');
          }
          return u.toString();
        } catch { return url; }
      }
      function render(slip) {
        const main = document.getElementById('main');
        if (!slip || !slip.l || !slip.l.length) {
          main.innerHTML = '<div class="card"><div class="empty"><strong>No slip data</strong>Slip links contain encoded data after #. This one looks empty or invalid.</div></div>';
          return;
        }
        const cost = slip.l.reduce((a, l) => a * (l.p || 0), 1);
        const mult = cost > 0 ? 1 / cost : 0;
        const stake = Number(slip.s || 10);
        const payout = mult * stake;

        const legsHtml = slip.l.map((l, i) => {
          const dir = (l.d || 'YES').toUpperCase();
          const dirClass = dir === 'NO' ? 'dir-no' : 'dir-yes';
          const meta = [
            l.e ? 'resolves ' + new Date(l.e).toLocaleDateString() : null
          ].filter(Boolean).join(' · ');
          const link = l.u ? `<a href="${escapeHtml(withRef(l.u))}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;display:contents;">` : '<div style="display:contents;">';
          const linkClose = l.u ? '</a>' : '</div>';
          return `<li>${link}
            <div class="num">${i + 1}</div>
            <div>
              <div class="q">${escapeHtml(l.q || 'Market')}</div>
              <div class="meta-line"><span class="${dirClass}">${dir}</span>${meta ? ' · ' + escapeHtml(meta) : ''}${l.u ? ' · view on Polymarket ↗' : ''}</div>
            </div>
            <div class="price">${fmt$(l.p)}</div>
          ${linkClose}</li>`;
        }).join('');

        main.innerHTML = `
          <div class="card">
            <div class="card-head">
              <h1>${slip.l.length}-leg parlay</h1>
              <div class="meta">If all hit</div>
            </div>
            <ul class="legs">${legsHtml}</ul>
            <div class="summary">
              <div class="stat">
                <div class="label">Multiplier</div>
                <div class="value">${fmtMult(mult)}</div>
              </div>
              <div class="stat">
                <div class="label">Stake</div>
                <div class="value">$${stake.toFixed(0)}</div>
              </div>
              <div class="stat">
                <div class="label">Max payout</div>
                <div class="value green">${fmt$(payout)}</div>
              </div>
            </div>
          </div>
        `;
      }
      render(decodeHash());
    </script>
  </body>
</html>
