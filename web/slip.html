<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PolyParlay slip</title>
    <meta property="og:title" content="PolyParlay slip" />
    <meta property="og:description" content="A multi-leg parlay built on Polymarket. Information only — verify on Polymarket before trading." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f5f1e8;
        --bg-2: #fdfcf7;
        --ink: #0a0c14;
        --ink-2: #1f2937;
        --muted: #6b6f7a;
        --accent: #4f46e5;
        --amber: #fbbf24;
        --green: #16a34a;
        --red: #dc2626;
        --shadow-md: 4px 4px 0 var(--ink);
        --shadow-sm: 3px 3px 0 var(--ink);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: var(--ink-2);
        background-color: var(--bg);
        background-image:
          radial-gradient(circle at 1px 1px, rgba(10, 12, 20, 0.08) 1px, transparent 0);
        background-size: 22px 22px;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .nav {
        max-width: 760px; margin: 0 auto;
        padding: 22px 24px;
        display: flex; justify-content: space-between; align-items: center;
      }
      .brand {
        display: flex; align-items: center; gap: 12px;
        font-weight: 800; color: var(--ink); text-decoration: none;
        font-size: 17px; letter-spacing: -0.01em;
      }
      .brand-mark {
        width: 40px; height: 40px;
        border-radius: 8px;
        background: var(--ink);
        border: 1.5px solid var(--ink);
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0 5px;
        font-weight: 900; font-size: 22px; line-height: 1;
        letter-spacing: -2px;
        box-shadow: var(--shadow-sm);
      }
      .brand-mark .p1 { color: var(--accent); }
      .brand-mark .p2 { color: var(--amber); }
      .install {
        background: var(--ink); color: var(--bg) !important;
        text-decoration: none;
        padding: 10px 16px;
        border-radius: 8px;
        border: 1.5px solid var(--ink);
        font-weight: 800;
        font-size: 13px;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.5px;
        box-shadow: var(--shadow-sm);
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .install:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
      .install:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }

      .wrap { max-width: 760px; margin: 0 auto; padding: 30px 24px 80px; }

      .card {
        background: var(--bg-2);
        border: 1.5px solid var(--ink);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow-md);
      }
      .card-head {
        padding: 18px 22px;
        border-bottom: 1.5px dashed var(--ink);
        display: flex; justify-content: space-between; align-items: baseline;
        background: var(--bg);
      }
      .card-head h1 {
        margin: 0;
        font-size: 22px; font-weight: 900; color: var(--ink);
        letter-spacing: -0.02em;
      }
      .card-head .meta {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px; color: var(--accent);
        letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
      }
      .legs { list-style: none; padding: 0; margin: 0; }
      .legs li {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        gap: 14px;
        padding: 16px 22px;
        border-top: 1px dashed rgba(10, 12, 20, 0.18);
        align-items: center;
      }
      .legs li:first-child { border-top: 0; }
      .num {
        width: 30px; height: 30px;
        border-radius: 7px;
        background: var(--ink);
        color: var(--bg);
        font-family: 'JetBrains Mono', monospace;
        font-weight: 800; font-size: 12px;
        display: flex; align-items: center; justify-content: center;
      }
      .q { color: var(--ink); font-weight: 700; font-size: 15px; line-height: 1.3; }
      .meta-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10.5px; color: var(--muted);
        margin-top: 5px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .dir-yes { color: var(--green); font-weight: 800; }
      .dir-no  { color: var(--red); font-weight: 800; }
      .price {
        color: var(--ink); font-weight: 800; font-size: 18px;
        font-family: 'JetBrains Mono', monospace;
      }

      .summary {
        padding: 22px;
        background: var(--ink);
        color: var(--bg);
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
      }
      .stat .label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10.5px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 700;
      }
      .stat .value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 30px;
        color: var(--bg);
        font-weight: 900;
        margin-top: 6px;
        letter-spacing: -0.02em;
      }
      .stat .value.green { color: #4ade80; }
      .stat .value.amber { color: var(--amber); }

      .footer {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1.5px solid var(--ink);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }
      .footer a { color: var(--ink); text-decoration: none; font-weight: 700; }
      .footer a:hover { text-decoration: underline; text-underline-offset: 3px; }

      .empty {
        padding: 80px 24px;
        text-align: center;
        color: var(--muted);
      }
      .empty strong {
        color: var(--ink); display: block;
        font-size: 22px; font-weight: 900;
        margin-bottom: 10px;
        letter-spacing: -0.02em;
      }

      @media (max-width: 600px) {
        .summary { grid-template-columns: 1fr; }
        .stat .value { font-size: 26px; }
        .legs li { grid-template-columns: 30px 1fr; padding: 14px 18px; }
        .legs .price { grid-column: 2; text-align: right; }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a class="brand" href="/">
        <span class="brand-mark"><span class="p1">P</span><span class="p2">P</span></span>
        PolyParlay
      </a>
      <a class="install" href="https://polyparlay.app" target="_blank" rel="noopener">INSTALL →</a>
    </nav>

    <div class="wrap">
      <main id="main"></main>
      <div class="footer">
        INFORMATION ONLY · VERIFY MARKETS ON
        <a href="https://polymarket.com" target="_blank" rel="noopener">POLYMARKET ↗</a>
        BEFORE TRADING
      </div>
    </div>

    <script>
      function decodeHash() {
        const hash = window.location.hash.replace(/^#/, '');
        if (!hash) return null;
        try {
          const padded = hash.replace(/-/g, '+').replace(/_/g, '/');
          const json = decodeURIComponent(escape(atob(padded)));
          return JSON.parse(json);
        } catch (e) {
          return null;
        }
      }
      function fmt$(n) {
        if (n == null || isNaN(n)) return '—';
        return '$' + Number(n).toFixed(2);
      }
      function fmtMult(n) {
        if (!isFinite(n) || n <= 0) return '—';
        return n.toFixed(2) + '×';
      }
      function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
      }
      function withRef(url) {
        if (!url) return url;
        try {
          const u = new URL(url);
          if (u.hostname.endsWith('polymarket.com') || u.hostname.endsWith('kalshi.com')) {
            if (!u.searchParams.has('ref')) u.searchParams.set('ref', 'polyparlay');
          }
          return u.toString();
        } catch { return url; }
      }
      function render(slip) {
        const main = document.getElementById('main');
        if (!slip || !slip.l || !slip.l.length) {
          main.innerHTML = '<div class="card"><div class="empty"><strong>No slip data</strong>Slip links contain encoded data after #. This one looks empty or invalid.</div></div>';
          return;
        }
        const cost = slip.l.reduce((a, l) => a * (l.p || 0), 1);
        const mult = cost > 0 ? 1 / cost : 0;
        const stake = Number(slip.s || 10);
        const payout = mult * stake;

        const legsHtml = slip.l.map((l, i) => {
          const dir = (l.d || 'YES').toUpperCase();
          const dirClass = dir === 'NO' ? 'dir-no' : 'dir-yes';
          const meta = [
            l.e ? 'resolves ' + new Date(l.e).toLocaleDateString() : null
          ].filter(Boolean).join(' · ');
          const link = l.u ? `<a href="${escapeHtml(withRef(l.u))}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;display:contents;">` : '<div style="display:contents;">';
          const linkClose = l.u ? '</a>' : '</div>';
          return `<li>${link}
            <div class="num">${String(i + 1).padStart(2, '0')}</div>
            <div>
              <div class="q">${escapeHtml(l.q || 'Market')}</div>
              <div class="meta-line"><span class="${dirClass}">${dir}</span>${meta ? ' · ' + escapeHtml(meta) : ''}${l.u ? ' · VIEW ON POLYMARKET ↗' : ''}</div>
            </div>
            <div class="price">${fmt$(l.p)}</div>
          ${linkClose}</li>`;
        }).join('');

        main.innerHTML = `
          <div class="card">
            <div class="card-head">
              <h1>${slip.l.length}-LEG PARLAY</h1>
              <div class="meta">// IF ALL HIT</div>
            </div>
            <ul class="legs">${legsHtml}</ul>
            <div class="summary">
              <div class="stat">
                <div class="label">Multiplier</div>
                <div class="value amber">${fmtMult(mult)}</div>
              </div>
              <div class="stat">
                <div class="label">Stake</div>
                <div class="value">$${stake.toFixed(0)}</div>
              </div>
              <div class="stat">
                <div class="label">Max payout</div>
                <div class="value green">${fmt$(payout)}</div>
              </div>
            </div>
          </div>
        `;
      }
      render(decodeHash());
    </script>
  </body>
</html>
